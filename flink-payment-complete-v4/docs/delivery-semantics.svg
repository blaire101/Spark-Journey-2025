<svg viewBox="0 0 1000 460" xmlns="http://www.w3.org/2000/svg" font-family="'Helvetica Neue', Arial, sans-serif">
  <rect width="1000" height="460" fill="#fafafa"/>
  <text x="500" y="30" text-anchor="middle" font-size="16" font-weight="700" fill="#1f2d3d">At-most-once / At-least-once / Exactly-once 对比</text>

  <!-- 三列 -->
  <rect x="40" y="60" width="290" height="220" rx="10" fill="#fff" stroke="#c0392b" stroke-width="2"/>
  <text x="185" y="90" text-anchor="middle" font-size="13" font-weight="700" fill="#c0392b">At-most-once</text>
  <text x="185" y="108" text-anchor="middle" font-size="10" fill="#7a2119">最多一次</text>
  <text x="60" y="140" font-size="11" fill="#5b6472">✓ 出故障时不重试</text>
  <text x="60" y="160" font-size="11" fill="#5b6472">✗ 可能丢消息</text>
  <text x="60" y="180" font-size="11" fill="#5b6472">✗ 绝不重复</text>
  <text x="60" y="210" font-size="11" fill="#c0392b" font-weight="600">代价：数据可能丢失</text>
  <text x="60" y="230" font-size="10" fill="#7a2119">很少用在关键业务上</text>

  <rect x="355" y="60" width="290" height="220" rx="10" fill="#fff" stroke="#e67e22" stroke-width="2"/>
  <text x="500" y="90" text-anchor="middle" font-size="13" font-weight="700" fill="#e67e22">At-least-once</text>
  <text x="500" y="108" text-anchor="middle" font-size="10" fill="#7a5416">至少一次</text>
  <text x="375" y="140" font-size="11" fill="#5b6472">✓ 出故障会重试</text>
  <text x="375" y="160" font-size="11" fill="#5b6472">✓ 保证不丢</text>
  <text x="375" y="180" font-size="11" fill="#5b6472">✗ 可能重复投递</text>
  <text x="375" y="210" font-size="11" fill="#e67e22" font-weight="600">代价：下游要自己幂等</text>
  <text x="375" y="230" font-size="10" fill="#7a5416">Kafka默认语义，本方案采用</text>

  <rect x="670" y="60" width="290" height="220" rx="10" fill="#fff" stroke="#2f9e6e" stroke-width="2"/>
  <text x="815" y="90" text-anchor="middle" font-size="13" font-weight="700" fill="#2f9e6e">Exactly-once</text>
  <text x="815" y="108" text-anchor="middle" font-size="10" fill="#155d3a">精确一次</text>
  <text x="690" y="140" font-size="11" fill="#5b6472">✓ 不丢不重</text>
  <text x="690" y="160" font-size="11" fill="#5b6472">✓ 靠Checkpoint+两阶段提交</text>
  <text x="690" y="180" font-size="11" fill="#5b6472">✗ 实现复杂，有性能开销</text>
  <text x="690" y="210" font-size="11" fill="#2f9e6e" font-weight="600">Flink内部计算能做到</text>
  <text x="690" y="230" font-size="10" fill="#155d3a">跨系统边界很难做到</text>

  <!-- 本方案落地情况 -->
  <rect x="60" y="310" width="880" height="130" rx="8" fill="white" stroke="#c9d2dc"/>
  <text x="500" y="335" text-anchor="middle" font-size="13" font-weight="700" fill="#1f2d3d">本方案实际落地情况（面试常问）</text>
  <text x="80" y="360" font-size="11" fill="#5b6472">① Flink内部计算（去重、Lookup Join）：靠 Checkpoint 机制做到 Exactly-once，状态不丢不重</text>
  <text x="80" y="382" font-size="11" fill="#5b6472">② 写 upsert-kafka：投递可能是 at-least-once（重复写），但因为按 user_id 主键覆盖，最终效果等价于精确一次</text>
  <text x="80" y="404" font-size="11" fill="#5b6472">③ 下游发券服务：Kafka消费是 at-least-once，必须自己用 Redis SETNX 做幂等兜底，防止重复发券</text>
  <text x="80" y="426" font-size="11" fill="#c0392b">结论：跨系统端到端精确一次很难做到，实际都是"at-least-once + 下游幂等"组合实现</text>
</svg>
