<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="320" viewBox="0 0 1200 320">
  <style>
    .box{fill:#fff;stroke:#2563eb;stroke-width:2;rx:14}
    .gold{fill:#fff7ed;stroke:#d97706;stroke-width:2;rx:14}
    .green{fill:#ecfdf5;stroke:#059669;stroke-width:2;rx:14}
    .t{font:700 18px Arial;fill:#172033}
    .s{font:14px Arial;fill:#475569}
    .a{stroke:#64748b;stroke-width:2;marker-end:url(#arrow)}
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b"/>
    </marker>
  </defs>
  <rect x="20" y="80" width="180" height="110" class="box"/>
  <text x="110" y="120" text-anchor="middle" class="t">Mock ODS / Glue Catalog</text>
  <text x="110" y="150" text-anchor="middle" class="s">reservation · order · campaign</text>

  <rect x="250" y="80" width="180" height="110" class="box"/>
  <text x="340" y="120" text-anchor="middle" class="t">DWD + DIM</text>
  <text x="340" y="150" text-anchor="middle" class="s">dedup reservation</text>
  <text x="340" y="172" text-anchor="middle" class="s">paid order only</text>

  <rect x="480" y="80" width="210" height="110" class="gold"/>
  <text x="585" y="120" text-anchor="middle" class="t">DM Conversion</text>
  <text x="585" y="150" text-anchor="middle" class="s">time-window non-equi join</text>

  <rect x="750" y="35" width="200" height="100" class="green"/>
  <text x="850" y="78" text-anchor="middle" class="t">ADS</text>
  <text x="850" y="106" text-anchor="middle" class="s">conversion metrics</text>

  <rect x="750" y="175" width="200" height="100" class="green"/>
  <text x="850" y="218" text-anchor="middle" class="t">CRM Audience</text>
  <text x="850" y="246" text-anchor="middle" class="s">reserved but not paid</text>

  <rect x="1000" y="35" width="170" height="100" class="box"/>
  <text x="1085" y="78" text-anchor="middle" class="t">Athena / BI</text>
  <text x="1085" y="106" text-anchor="middle" class="s">analysis</text>

  <rect x="1000" y="175" width="170" height="100" class="box"/>
  <text x="1085" y="218" text-anchor="middle" class="t">CRM</text>
  <text x="1085" y="246" text-anchor="middle" class="s">push / email</text>

  <line x1="200" y1="135" x2="250" y2="135" class="a"/>
  <line x1="430" y1="135" x2="480" y2="135" class="a"/>
  <line x1="690" y1="120" x2="750" y2="85" class="a"/>
  <line x1="690" y1="150" x2="750" y2="225" class="a"/>
  <line x1="950" y1="85" x2="1000" y2="85" class="a"/>
  <line x1="950" y1="225" x2="1000" y2="225" class="a"/>
</svg>
