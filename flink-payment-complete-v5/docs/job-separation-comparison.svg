<svg viewBox="0 0 1000 480" xmlns="http://www.w3.org/2000/svg" font-family="'Helvetica Neue', Arial, sans-serif">
  <defs>
    <marker id="js1" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#5b6472"/>
    </marker>
  </defs>
  <rect width="1000" height="480" fill="#fafafa"/>
  <text x="500" y="30" text-anchor="middle" font-size="16" font-weight="700" fill="#1f2d3d">窗口统计 vs 首次支付判断：合并成一个作业，还是分开？</text>

  <!-- 左：合并方案 -->
  <rect x="40" y="60" width="440" height="380" rx="10" fill="#fff" stroke="#e67e22" stroke-width="2"/>
  <text x="260" y="90" text-anchor="middle" font-size="13" font-weight="700" fill="#e67e22">方案A：合并成一个作业（STATEMENT SET共享Source）</text>

  <rect x="70" y="110" width="380" height="40" rx="6" fill="#fef2e6"/>
  <text x="260" y="135" text-anchor="middle" font-size="11">ft_src_payment_events（只读一次Kafka）</text>
  <path d="M260,150 L180,180" stroke="#5b6472" stroke-width="1.5" marker-end="url(#js1)"/>
  <path d="M260,150 L340,180" stroke="#5b6472" stroke-width="1.5" marker-end="url(#js1)"/>

  <rect x="80" y="180" width="180" height="40" rx="6" fill="#fef2e6"/>
  <text x="170" y="205" text-anchor="middle" font-size="10">ROW_NUMBER去重</text>
  <rect x="260" y="180" width="180" height="40" rx="6" fill="#fef2e6"/>
  <text x="350" y="205" text-anchor="middle" font-size="10">TUMBLE窗口聚合</text>

  <rect x="70" y="250" width="380" height="150" rx="6" fill="#fffaf3" stroke="#f0c896"/>
  <text x="260" y="275" text-anchor="middle" font-size="12" font-weight="700" fill="#c07a1f">优点</text>
  <text x="90" y="298" font-size="10" fill="#7a5416">✓ 只消费一次Kafka，省资源</text>
  <text x="260" y="322" text-anchor="middle" font-size="12" font-weight="700" fill="#c0392b">缺点（更致命）</text>
  <text x="90" y="345" font-size="10" fill="#7a2119">✗ 两个逻辑共享同一个JobGraph、同一次Checkpoint</text>
  <text x="90" y="365" font-size="10" fill="#7a2119">✗ 大盘统计逻辑改动频繁 → 每次都要重启核心链路</text>
  <text x="90" y="385" font-size="10" fill="#7a2119">✗ 一方backpressure/故障会拖累另一方，故障域耦合</text>

  <!-- 右：分离方案 -->
  <rect x="520" y="60" width="440" height="380" rx="10" fill="#fff" stroke="#2f9e6e" stroke-width="2"/>
  <text x="740" y="90" text-anchor="middle" font-size="13" font-weight="700" fill="#2f9e6e">✅ 方案B：分开两个独立作业（推荐）</text>

  <rect x="550" y="110" width="170" height="40" rx="6" fill="#e8f8ef"/>
  <text x="635" y="130" text-anchor="middle" font-size="10">作业① Consumer Group A</text>
  <text x="635" y="144" text-anchor="middle" font-size="9">DedupFirstPayJob</text>

  <rect x="750" y="110" width="170" height="40" rx="6" fill="#e8f8ef"/>
  <text x="835" y="130" text-anchor="middle" font-size="10">作业⑤ Consumer Group C</text>
  <text x="835" y="144" text-anchor="middle" font-size="9">HourlyPayStatsJob</text>

  <text x="740" y="170" text-anchor="middle" font-size="10" fill="#5b6472">各自独立读同一个 Kafka topic，互不影响</text>

  <rect x="550" y="190" width="370" height="210" rx="6" fill="#f4fcf7" stroke="#a8dbc0"/>
  <text x="735" y="215" text-anchor="middle" font-size="12" font-weight="700" fill="#155d3a">优点</text>
  <text x="570" y="238" font-size="10" fill="#155d3a">✓ 故障域完全隔离：统计作业挂了不影响发券</text>
  <text x="570" y="258" font-size="10" fill="#155d3a">✓ 各自独立重启、独立扩缩容、独立告警级别</text>
  <text x="570" y="278" font-size="10" fill="#155d3a">✓ 大盘需求经常变，改动不影响核心链路稳定性</text>
  <text x="570" y="298" font-size="10" fill="#155d3a">✓ SLA可以分级：核心链路P0，统计大盘P2</text>
  <text x="735" y="330" text-anchor="middle" font-size="12" font-weight="700" fill="#c0392b">代价（可接受）</text>
  <text x="570" y="353" font-size="10" fill="#7a2119">Kafka被多读一次，但Kafka天生支持多消费者组</text>
  <text x="570" y="373" font-size="10" fill="#7a2119">重复读，这点资源开销远小于耦合带来的风险</text>

  <text x="500" y="430" text-anchor="middle" font-size="12" fill="#1f2d3d" font-weight="700">核心判断标准：业务重要性/变更频率不同的逻辑，物理拆开成独立作业</text>
  <text x="500" y="450" text-anchor="middle" font-size="11" fill="#5b6472">这跟之前把"去重"和"发券判断"拆成作业①②是完全同一个设计原则</text>
</svg>
