<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="680" height="180" viewBox="0 0 680 180" role="img">
<title>Domain 1 pipeline overview</title>
<desc>Source data flows through streaming or batch ingestion into transform and process step then through orchestration layer to sink destinations</desc>
<defs>
  <marker id="d1-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#5C6478" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <style>
    .d1-th{font-family:-apple-system,sans-serif;font-size:13px;font-weight:600;fill:#1E2433;}
    .d1-ts{font-family:-apple-system,sans-serif;font-size:11px;fill:#5A6478;}
    .d1-blue{fill:#E6F1FB;stroke:#185FA5;stroke-width:0.5;}
    .d1-teal{fill:#E1F5EE;stroke:#0F6E56;stroke-width:0.5;}
    .d1-amber{fill:#FAEEDA;stroke:#854F0B;stroke-width:0.5;}
    .d1-green{fill:#ECFDF5;stroke:#059669;stroke-width:0.5;}
  </style>
</defs>
<rect x="0" y="0" width="680" height="180" fill="#FFFFFF"/>

<rect x="20" y="50" width="110" height="80" rx="8" class="d1-blue"/>
<text class="d1-th" x="75" y="80" text-anchor="middle" dominant-baseline="central">Sources</text>
<text class="d1-ts" x="75" y="98" text-anchor="middle" dominant-baseline="central">S3 · Kinesis</text>
<text class="d1-ts" x="75" y="114" text-anchor="middle" dominant-baseline="central">MSK · RDS · DDB</text>

<line x1="130" y1="90" x2="165" y2="90" stroke="#5C6478" stroke-width="1.2" fill="none" marker-end="url(#d1-arrow)"/>

<rect x="165" y="50" width="120" height="80" rx="8" class="d1-amber"/>
<text class="d1-th" x="225" y="75" text-anchor="middle" dominant-baseline="central">Ingest</text>
<text class="d1-ts" x="225" y="93" text-anchor="middle" dominant-baseline="central">Kinesis · MSK</text>
<text class="d1-ts" x="225" y="109" text-anchor="middle" dominant-baseline="central">AppFlow · DMS</text>

<line x1="285" y1="90" x2="320" y2="90" stroke="#5C6478" stroke-width="1.2" fill="none" marker-end="url(#d1-arrow)"/>

<rect x="320" y="50" width="120" height="80" rx="8" class="d1-teal"/>
<text class="d1-th" x="380" y="75" text-anchor="middle" dominant-baseline="central">Transform</text>
<text class="d1-ts" x="380" y="93" text-anchor="middle" dominant-baseline="central">Glue · EMR</text>
<text class="d1-ts" x="380" y="109" text-anchor="middle" dominant-baseline="central">Lambda · Redshift</text>

<line x1="440" y1="90" x2="475" y2="90" stroke="#5C6478" stroke-width="1.2" fill="none" marker-end="url(#d1-arrow)"/>

<rect x="475" y="50" width="120" height="80" rx="8" class="d1-blue"/>
<text class="d1-th" x="535" y="75" text-anchor="middle" dominant-baseline="central">Orchestrate</text>
<text class="d1-ts" x="535" y="93" text-anchor="middle" dominant-baseline="central">Step Functions</text>
<text class="d1-ts" x="535" y="109" text-anchor="middle" dominant-baseline="central">MWAA · Glue</text>

<line x1="595" y1="90" x2="630" y2="90" stroke="#5C6478" stroke-width="1.2" fill="none" marker-end="url(#d1-arrow)"/>

<rect x="630" y="65" width="40" height="50" rx="8" class="d1-green"/>
<text class="d1-ts" x="650" y="90" text-anchor="middle" dominant-baseline="central">Sink</text>
</svg>
