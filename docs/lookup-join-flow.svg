<svg viewBox="0 0 900 420" xmlns="http://www.w3.org/2000/svg" font-family="'Helvetica Neue', Arial, sans-serif">
  <defs>
    <marker id="arrow3" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#5b6472"/>
    </marker>
  </defs>
  <rect width="900" height="420" fill="#fafafa"/>
  <text x="450" y="35" text-anchor="middle" font-size="16" font-weight="700" fill="#1f2d3d">Lookup Join 判断：今天这条到底是不是"首次登录"</text>

  <rect x="350" y="60" width="200" height="55" rx="8" fill="#2f9e6e"/>
  <text x="450" y="83" text-anchor="middle" fill="white" font-size="12" font-weight="600">今天流内去重后</text>
  <text x="450" y="100" text-anchor="middle" fill="white" font-size="12">u_1001, 08:02:11</text>

  <path d="M450,115 L450,150" stroke="#5b6472" stroke-width="2" marker-end="url(#arrow3)"/>

  <rect x="330" y="150" width="240" height="60" rx="8" fill="#3b6ea5"/>
  <text x="450" y="175" text-anchor="middle" fill="white" font-size="12" font-weight="600">去查 Hive T-1 维表</text>
  <text x="450" y="193" text-anchor="middle" fill="white" font-size="11">FOR SYSTEM_TIME AS OF proctime</text>

  <path d="M400,210 C 300,240 220,240 220,260" stroke="#5b6472" stroke-width="2" marker-end="url(#arrow3)"/>
  <path d="M500,210 C 620,240 700,240 700,260" stroke="#5b6472" stroke-width="2" marker-end="url(#arrow3)"/>

  <text x="290" y="235" font-size="12" fill="#c0392b" font-weight="700">查不到 (h.user_id IS NULL)</text>
  <text x="620" y="235" font-size="12" fill="#2f9e6e" font-weight="700">查到了 (历史已存在)</text>

  <!-- 左分支：新用户 -->
  <rect x="90" y="260" width="260" height="120" rx="8" fill="#fdecea" stroke="#c0392b" stroke-width="1.5"/>
  <text x="220" y="285" text-anchor="middle" font-size="13" font-weight="700" fill="#c0392b">今天真的第一次登录</text>
  <text x="220" y="310" text-anchor="middle" font-size="12">first_login_time</text>
  <text x="220" y="328" text-anchor="middle" font-size="12" font-weight="700">= t.today_first_login_time</text>
  <text x="220" y="352" text-anchor="middle" font-size="12">is_new_user_today</text>
  <text x="220" y="368" text-anchor="middle" font-size="12" font-weight="700">= true</text>

  <!-- 右分支：老用户 -->
  <rect x="570" y="260" width="260" height="120" rx="8" fill="#e8f8ef" stroke="#2f9e6e" stroke-width="1.5"/>
  <text x="700" y="285" text-anchor="middle" font-size="13" font-weight="700" fill="#155d3a">不是首登，早就来过</text>
  <text x="700" y="310" text-anchor="middle" font-size="12">first_login_time</text>
  <text x="700" y="328" text-anchor="middle" font-size="12" font-weight="700">= h.first_login_time（老值）</text>
  <text x="700" y="352" text-anchor="middle" font-size="12">is_new_user_today</text>
  <text x="700" y="368" text-anchor="middle" font-size="12" font-weight="700">= false</text>

  <text x="450" y="410" text-anchor="middle" font-size="12" fill="#5b6472">对应 SQL：COALESCE(h.first_login_time, t.today_first_login_time) + h.user_id IS NULL</text>
</svg>
