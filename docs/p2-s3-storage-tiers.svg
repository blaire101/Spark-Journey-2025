<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="680" height="100" viewBox="0 0 680 100" role="img">
<title>S3 storage tier cost versus access frequency</title>
<desc>Moving from left to right, Standard has high cost and frequent access, Standard IA has medium cost and monthly access, Glacier Instant has lower cost and quarterly access, Glacier Flexible has low cost and yearly access, Glacier Deep Archive has lowest cost and rare access</desc>
<defs>
  <style>
    .s3-th{font-family:-apple-system,sans-serif;font-size:12px;font-weight:600;fill:#1E2433;}
    .s3-ts{font-family:-apple-system,sans-serif;font-size:10px;fill:#5A6478;}
  </style>
</defs>
<rect x="0" y="0" width="680" height="100" fill="#FFFFFF"/>

<rect x="10"  y="20" width="110" height="50" rx="6" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text class="s3-th" x="65" y="38" text-anchor="middle" dominant-baseline="central">Standard</text>
<text class="s3-ts" x="65" y="55" text-anchor="middle" dominant-baseline="central">Daily access</text>

<text fill="#9CA3AF" x="126" y="47" font-size="14">→</text>

<rect x="136" y="20" width="116" height="50" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text class="s3-th" x="194" y="38" text-anchor="middle" dominant-baseline="central">Standard-IA</text>
<text class="s3-ts" x="194" y="55" text-anchor="middle" dominant-baseline="central">Monthly access</text>

<text fill="#9CA3AF" x="258" y="47" font-size="14">→</text>

<rect x="268" y="20" width="116" height="50" rx="6" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text class="s3-th" x="326" y="38" text-anchor="middle" dominant-baseline="central">Glacier Instant</text>
<text class="s3-ts" x="326" y="55" text-anchor="middle" dominant-baseline="central">Quarterly</text>

<text fill="#9CA3AF" x="390" y="47" font-size="14">→</text>

<rect x="400" y="20" width="116" height="50" rx="6" fill="#F5F3FF" stroke="#534AB7" stroke-width="0.5"/>
<text class="s3-th" x="458" y="38" text-anchor="middle" dominant-baseline="central">Glacier Flexible</text>
<text class="s3-ts" x="458" y="55" text-anchor="middle" dominant-baseline="central">Yearly · mins-hours</text>

<text fill="#9CA3AF" x="522" y="47" font-size="14">→</text>

<rect x="532" y="20" width="138" height="50" rx="6" fill="#FEF2F2" stroke="#A32D2D" stroke-width="0.5"/>
<text class="s3-th" x="601" y="38" text-anchor="middle" dominant-baseline="central">Deep Archive</text>
<text class="s3-ts" x="601" y="55" text-anchor="middle" dominant-baseline="central">Rare · 12h retrieval</text>

<text class="s3-ts" x="10" y="90">← Frequent access, higher cost</text>
<text class="s3-ts" x="680" y="90" text-anchor="end">Rare access, lowest cost →</text>
</svg>
