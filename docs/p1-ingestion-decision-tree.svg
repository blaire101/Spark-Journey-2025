<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="700" height="260" viewBox="0 0 700 260" role="img">
<title>Ingestion decision tree</title>
<desc>Start by asking if data arrives continuously, if yes and its custom real time use Kinesis Data Streams, if yes and its existing Kafka use MSK, if no and its a file landing in S3 use S3 event notification with Lambda or Glue, if no and its a SaaS application use AppFlow, if no and its a database use DMS with change data capture</desc>
<defs>
  <marker id="dt-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#5C6478" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <style>
    .dt-th{font-family:-apple-system,sans-serif;font-size:12px;font-weight:700;fill:#1E2433;}
    .dt-ts{font-family:-apple-system,sans-serif;font-size:10.5px;fill:#5A6478;}
  </style>
</defs>
<rect x="0" y="0" width="700" height="260" fill="#FFFFFF"/>

<rect x="270" y="10" width="160" height="42" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
<text class="dt-th" x="350" y="35" text-anchor="middle">Does data arrive continuously?</text>

<line x1="310" y1="52" x2="150" y2="80" stroke="#5C6478" stroke-width="1" fill="none" marker-end="url(#dt-arrow)"/>
<text class="dt-ts" x="200" y="65" text-anchor="middle" fill="#059669" font-weight="700">YES</text>
<line x1="390" y1="52" x2="550" y2="80" stroke="#5C6478" stroke-width="1" fill="none" marker-end="url(#dt-arrow)"/>
<text class="dt-ts" x="500" y="65" text-anchor="middle" fill="#A32D2D" font-weight="700">NO</text>

<rect x="20" y="84" width="180" height="46" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text class="dt-th" x="110" y="102" text-anchor="middle">Custom real-time app</text>
<text class="dt-ts" x="110" y="118" text-anchor="middle">→ Kinesis Data Streams</text>

<rect x="215" y="84" width="180" height="46" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text class="dt-th" x="305" y="102" text-anchor="middle">Existing Kafka workload</text>
<text class="dt-ts" x="305" y="118" text-anchor="middle">→ Amazon MSK</text>

<rect x="410" y="84" width="130" height="46" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text class="dt-th" x="475" y="102" text-anchor="middle">File in S3</text>
<text class="dt-ts" x="475" y="118" text-anchor="middle">→ S3 Event + Lambda</text>

<rect x="550" y="84" width="140" height="46" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text class="dt-th" x="620" y="102" text-anchor="middle">SaaS (Salesforce etc.)</text>
<text class="dt-ts" x="620" y="118" text-anchor="middle">→ Amazon AppFlow</text>

<rect x="410" y="146" width="280" height="46" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text class="dt-th" x="550" y="164" text-anchor="middle">Existing database, need CDC</text>
<text class="dt-ts" x="550" y="180" text-anchor="middle">→ AWS DMS (Change Data Capture mode)</text>

<text class="dt-ts" x="10" y="230" fill="#5A6478">This decision tree covers the majority of Task 1.1 exam scenarios — memorise this shape, not just the service names</text>
</svg>
