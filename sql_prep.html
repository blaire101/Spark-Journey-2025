<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SQL Interview Prep — English Practice</title>
<style>
  :root {
    --bg: #FAFAF9; --surface: #FFFFFF; --border: #E5E5E3; --border-strong: #D4D4D0;
    --text-primary: #1A1A18; --text-secondary: #57564F; --text-muted: #8A8985;
    --accent: #2971A8; --accent-bg: #E8F2FA;
    --success: #1E7A4C; --success-bg: #E4F5EC;
    --warning: #9A6B1E; --warning-bg: #FBF0DD;
    --radius: 10px;
  }
  * { box-sizing: border-box; }
  body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif; background:var(--bg); color:var(--text-primary); line-height:1.55; }
  .app { max-width: 960px; margin: 0 auto; padding: 24px 20px 80px; }
  header h1 { font-size: 21px; font-weight: 600; margin: 0 0 4px; }
  header p { font-size: 13.5px; color: var(--text-secondary); margin: 0 0 16px; }

  .voice-bar { display:flex; align-items:center; gap:10px; flex-wrap:wrap; background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:10px 14px; margin-bottom:18px; font-size:13px; color:var(--text-secondary); }
  .voice-bar select { font-size:13px; padding:4px 8px; border-radius:6px; border:1px solid var(--border-strong); }
  .voice-bar input[type=range] { width:100px; }

  .tabs { display:flex; gap:4px; margin-bottom:18px; border-bottom:1px solid var(--border); overflow-x:auto; }
  .tab-btn { padding:9px 14px; font-size:13px; font-weight:500; color:var(--text-secondary); background:none; border:none; border-bottom:2px solid transparent; cursor:pointer; white-space:nowrap; }
  .tab-btn.active { color:var(--accent); border-bottom-color:var(--accent); }
  .tab-panel { display:none; }
  .tab-panel.active { display:block; }

  .card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:16px 18px; margin-bottom:14px; }
  .q-head { display:flex; justify-content:space-between; align-items:flex-start; gap:10px; margin-bottom:8px; }
  .q-title { font-size:15px; font-weight:600; margin:0; }
  .q-desc { font-size:13px; color:var(--text-secondary); margin:4px 0 10px; }

  .codeblock { background:#F4F4F2; border-radius:8px; padding:10px 14px; font-family:"SF Mono",Menlo,monospace; font-size:11.8px; color:var(--text-primary); white-space:pre; overflow-x:auto; margin:8px 0; line-height:1.55; }
  .kw { color:#AF3A83; font-weight:600; }        /* keywords: SELECT, FROM, WHERE... */
  .fn { color:#2971A8; font-weight:600; }        /* functions: COUNT, SUM, LAG... */
  .str { color:#1E7A4C; }                         /* string literals */
  .num { color:#B5651D; }                         /* numbers */
  .cmt { color:#8A8985; font-style:italic; }      /* -- comments */
  .step-label { font-size:12px; font-weight:700; color:var(--accent); margin:10px 0 2px; display:block; }

  table.datatbl { border-collapse:collapse; font-size:11.5px; margin:6px 0 10px; width:100%; overflow-x:auto; display:block; }
  table.datatbl th, table.datatbl td { border:1px solid var(--border); padding:4px 8px; text-align:center; white-space:nowrap; }
  table.datatbl th { background:var(--accent-bg); color:var(--accent); font-weight:600; }
  table.datatbl td.hl { background:var(--success-bg); color:var(--success); font-weight:600; }

  .tip { font-size:12px; color:var(--success); background:var(--success-bg); border-radius:6px; padding:6px 10px; margin-top:8px; }
  .warn { font-size:12px; color:var(--warning); background:var(--warning-bg); border-radius:6px; padding:6px 10px; margin-top:8px; }

  .listen-btn { flex-shrink:0; display:flex; align-items:center; gap:6px; font-size:12px; font-weight:500; padding:5px 10px; border-radius:999px; border:1px solid var(--accent); background:var(--accent-bg); color:var(--accent); cursor:pointer; }
  .listen-btn.speaking { background:var(--accent); color:white; }
  .listen-btn svg { width:12px; height:12px; }

  .intro-note { font-size:13px; color:var(--text-secondary); background:var(--accent-bg); border-radius:var(--radius); padding:10px 14px; margin-bottom:16px; }
</style>
</head>
<body>
<div class="app">
  <header>
    <h1>SQL Interview Prep</h1>
    <p>Organized by topic, with runnable examples and English read-aloud practice</p>
  </header>

  <div class="voice-bar">
    <label>🔊 Voice: <select id="voiceSelect"></select></label>
    <label>Speed: <input type="range" id="rateSlider" min="0.7" max="1.2" step="0.05" value="0.92"></label>
    <span id="rateLabel">0.92x</span>
    <button class="listen-btn" id="stopAllBtn" style="margin-left:auto">⏹ Stop</button>
  </div>

  <div class="tabs">
    <button class="tab-btn active" data-tab="basics">📘 Basics</button>
    <button class="tab-btn" data-tab="window">🧮 Window Functions</button>
    <button class="tab-btn" data-tab="spend">💰 Spend &amp; Averages</button>
    <button class="tab-btn" data-tab="consec">🔥 Consecutive Days</button>
    <button class="tab-btn" data-tab="ranking">📊 Sales Ranking</button>
    <button class="tab-btn" data-tab="retention">🔄 Retention</button>
  </div>

  <div id="basics" class="tab-panel active"></div>
  <div id="window" class="tab-panel"></div>
  <div id="spend" class="tab-panel"></div>
  <div id="consec" class="tab-panel"></div>
  <div id="ranking" class="tab-panel"></div>
  <div id="retention" class="tab-panel"></div>
</div>

<script>
const speakIcon = `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1-3.29-2.5-4.03v8.05c1.5-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>`;
function listenBtn(text) { return `<button class="listen-btn" data-action="speak" data-text="${encodeURIComponent(text)}">${speakIcon}Listen</button>`; }
function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

const SQL_KEYWORDS = new Set(['SELECT','FROM','WHERE','GROUP','BY','HAVING','ORDER','AS','AND','OR','NOT',
  'IN','IS','NULL','DISTINCT','INNER','LEFT','RIGHT','SELF','CROSS','JOIN','ON',
  'WITH','CASE','WHEN','THEN','ELSE','END','PARTITION','OVER','BETWEEN','LIMIT','DESC','ASC',
  'UNION','ALL','EXISTS','LIKE','CREATE','TABLE','INSERT','INTO','VALUES','ROUND']);
const SQL_FUNCTIONS = new Set(['COUNT','SUM','AVG','MIN','MAX','ROW_NUMBER','RANK','DENSE_RANK','LAG','LEAD',
  'FIRST_VALUE','LAST_VALUE','IFNULL','COALESCE','DATEDIFF','DATE_SUB','CURRENT_DATE']);

function highlightSQL(code) {
  // Single-pass tokenizer: comment | string | number | word | other-char
  // This avoids double-wrapping issues from sequential regex replacement.
  const tokenRe = /(--[^\n]*)|('[^']*')|(\b\d+(?:\.\d+)?\b)|([A-Za-z_][A-Za-z0-9_]*)|([\s\S])/g;
  let out = '';
  let match;
  while ((match = tokenRe.exec(code)) !== null) {
    const [, comment, str, num, word, other] = match;
    if (comment) {
      out += `<span class="cmt">${esc(comment)}</span>`;
    } else if (str) {
      out += `<span class="str">${esc(str)}</span>`;
    } else if (num) {
      out += `<span class="num">${esc(num)}</span>`;
    } else if (word) {
      const upper = word.toUpperCase();
      if (SQL_FUNCTIONS.has(upper)) {
        out += `<span class="fn">${esc(word)}</span>`;
      } else if (SQL_KEYWORDS.has(upper)) {
        out += `<span class="kw">${esc(word)}</span>`;
      } else {
        out += esc(word);
      }
    } else {
      out += esc(other);
    }
  }
  return out;
}
function table(headers, rows, hlCol) {
  let html = '<table class="datatbl"><thead><tr>' + headers.map(h=>`<th>${h}</th>`).join('') + '</tr></thead><tbody>';
  rows.forEach(r => {
    html += '<tr>' + r.map((c,i) => `<td${hlCol===i?' class="hl"':''}>${c}</td>`).join('') + '</tr>';
  });
  html += '</tbody></table>';
  return html;
}

// ============================================================
// TAB 1 — BASICS
// ============================================================
const basicsData = [
  {
    title: "Query structure & clauses",
    speak: "The standard SQL query order is FROM, WHERE, GROUP BY, HAVING, SELECT, ORDER BY. WHERE filters rows before grouping, HAVING filters groups after aggregation.",
    desc: "The core clause order every query follows, plus common NULL-handling functions.",
    diagram: true,
    code: `-- NULL handling
SELECT IFNULL(score, 0) AS score_val FROM student;
SELECT COALESCE(score1, score2, 0) AS score_val FROM student;
-- COALESCE is more versatile — accepts multiple fallback values`,
    tip: "COALESCE > IFNULL when you need multiple fallback values, not just one."
  },
  {
    title: "Finding duplicates",
    speak: "COUNT star counts all rows including nulls. COUNT of a column only counts non-null values in that column — that difference matters when checking for duplicates.",
    desc: "COUNT(*) vs COUNT(column) — a subtle but important distinction.",
    code: `SELECT name, COUNT(*), COUNT(student_id)  -- COUNT(column) only counts non-NULL values
FROM students
GROUP BY name
HAVING COUNT(*) > 1;`,
    tip: "COUNT(*) counts all rows. COUNT(column) skips NULLs in that column."
  },
  {
    title: "Left Join — Anti-join pattern",
    speak: "This pattern finds rows in table A that have no matching key in table B — a classic anti-join using LEFT JOIN plus a NULL check.",
    desc: "Find rows in A whose key does NOT exist in B.",
    code: `SELECT a.*
FROM a
LEFT JOIN b ON a.key = b.key
WHERE b.key IS NULL;`,
    tip: "This is the standard 'anti-join' pattern — LEFT JOIN + WHERE ... IS NULL."
  },
  {
    title: "Joins & Subqueries overview",
    speak: "The five join types: inner join returns only matching rows, left join keeps all rows from the left table, right join keeps all from the right, self join joins a table to itself, and cross join produces every combination.",
    desc: "Quick reference for the join family.",
    code: `INNER JOIN   -- only matching rows on both sides
LEFT JOIN    -- all rows from left, matched or NULL from right
RIGHT JOIN   -- all rows from right, matched or NULL from left
SELF JOIN    -- a table joined to itself
CROSS JOIN   -- every combination (cartesian product)`,
    tip: null
  },
];

// ============================================================
// TAB 2 — WINDOW FUNCTIONS
// ============================================================
const windowData = [
  {
    title: "Window function basics",
    speak: "Window functions use PARTITION BY to group rows and ORDER BY to sequence them within each group, without collapsing rows the way GROUP BY does.",
    desc: "The building blocks: PARTITION BY, ORDER BY, and the functions that use them.",
    code: `-- Ranking
ROW_NUMBER()   -- unique rank, no ties
RANK()         -- ties share rank, next rank skips
DENSE_RANK()   -- ties share rank, no skip

-- Analytics
SUM(), AVG(), MIN(), MAX() OVER (...)

-- Positional
LAG()          -- access the PREVIOUS row
LEAD()         -- access the NEXT row
FIRST_VALUE(), LAST_VALUE()

-- Example
ROW_NUMBER() OVER (PARTITION BY user_id ORDER BY login_date)
LAG(txn_date) OVER (PARTITION BY customer_id ORDER BY txn_date)`,
    tip: "PARTITION BY = 'group by' for window functions, but rows are NOT collapsed like GROUP BY does."
  },
];

// ============================================================
// TAB 3 — SPEND & AVERAGES
// ============================================================
const spendData = [
  {
    title: "Case 1: Average DAILY spend exceeds 3",
    speak: "First sum each customer's transactions per day, then average those daily totals, and filter for customers whose daily average exceeds 3.",
    desc: "Two-step aggregation: sum per day first, then average the daily sums.",
    sample: table(["customer_id","txn_date","txn_amount"], [
      ["1","2025-08-01","1.00"],["1","2025-08-01","2.00"],["1","2025-08-02","5.00"],
      ["2","2025-08-01","4.00"],["2","2025-08-02","2.00"],
    ]),
    code: `SELECT
  customer_id,
  AVG(daily_sum) AS average_spend
FROM (
  SELECT customer_id, txn_date, SUM(txn_amount) AS daily_sum
  FROM transaction
  GROUP BY customer_id, txn_date
) AS daily_spend
GROUP BY customer_id
HAVING AVG(daily_sum) > 3;`,
    result: table(["customer_id","daily sums","average","included?"], [
      ["1","{3.00, 5.00}","4.00","✅ included"],
      ["2","{4.00, 2.00}","3.00","❌ excluded (not > 3)"],
    ]),
    tip: "Nested subquery pattern: aggregate once inside, aggregate again outside."
  },
  {
    title: "Case 2: Average PER TRANSACTION spend",
    speak: "This is simpler — just average every individual transaction amount per customer directly, no daily grouping needed.",
    desc: "Compare this to Case 1 — no need to group by day first.",
    code: `SELECT
  customer_id,
  AVG(txn_amount) AS average_spend
FROM transaction
GROUP BY customer_id
HAVING AVG(txn_amount) > 3;`,
    tip: "Read the question carefully — 'average daily spend' and 'average per transaction' need different queries!"
  },
  {
    title: "Average days between transactions",
    speak: "Use LAG to pull each customer's previous transaction date into the same row, then compute the date difference, then average those gaps.",
    desc: "A classic three-step LAG pattern for measuring the gap between events.",
    sample: table(["customer_id","txn_date","txn_amount"], [
      ["C1","2024-01-10","20"],["C1","2024-01-01","10"],["C1","2024-01-05","15"],
      ["C2","2024-01-04","7"],["C2","2024-01-02","5"],
    ]),
    code: `-- Step 1: get previous transaction date
WITH transaction_date AS (
    SELECT customer_id, txn_date,
        LAG(txn_date) OVER (PARTITION BY customer_id ORDER BY txn_date) AS prev_transaction_date
    FROM transaction
),
-- Step 2: calculate days between transactions
date_diff AS (
    SELECT customer_id,
        DATEDIFF(txn_date, prev_transaction_date) AS date_between_transactions
    FROM transaction_date
    WHERE prev_transaction_date IS NOT NULL
)
-- Step 3: average
SELECT customer_id, AVG(date_between_transactions) AS avg_days_transactions
FROM date_diff
GROUP BY customer_id;`,
    result: table(["customer_id","avg_days_transactions"], [["C1","4.5"],["C2","2.0"]]),
    tip: "LAG automatically sorts by the ORDER BY inside OVER() first, THEN takes the previous row — the input order in the raw table doesn't matter."
  },
  {
    title: "Top 10 spenders in last 30 days",
    speak: "Filter to the last 30 days, sum spend per user, sort descending, and take the top 10.",
    desc: "A simple filter + aggregate + rank pattern.",
    code: `SELECT user_id, SUM(amount) AS total_spend
FROM transactions
WHERE tx_time >= DATE_SUB(CURRENT_DATE(), 30)
GROUP BY user_id
ORDER BY total_spend DESC
LIMIT 10;`,
    tip: null
  },
];

// ============================================================
// TAB 4 — CONSECUTIVE DAYS
// ============================================================
const consecData = [
  {
    title: "Consecutive 3-day logins (exact gap-of-1 method)",
    speak: "The trick is subtracting the row number from the login date. If dates are truly consecutive, that subtraction produces the SAME value for every row in the streak — giving you a free grouping key.",
    desc: "The classic 'row number minus date' trick to detect consecutive sequences.",
    sample: table(["user_id","login_date"], [["A","2025-01-01"],["A","2025-01-02"],["A","2025-01-03"],["A","2025-01-05"]]),
    code: `-- Step 1: assign row numbers and calculate grouping flag
WITH t2_sub_flag AS (
    SELECT user_id, login_date,
        ROW_NUMBER() OVER (PARTITION BY user_id ORDER BY login_date) AS rk,
        DATE_SUB(login_date, ROW_NUMBER() OVER (PARTITION BY user_id ORDER BY login_date)) AS flag_date
    FROM table1
)
-- Step 2: group and filter for continuous segments
, segments AS (
    SELECT user_id, flag_date, COUNT(1) AS cnt,
        MIN(login_date) AS min_login_date, MAX(login_date) AS max_login_date
    FROM t2_sub_flag
    GROUP BY user_id, flag_date
    HAVING COUNT(1) >= 3
)
-- Step 3: join back for concrete dates
SELECT s.user_id, s.flag_date, s.cnt, s.min_login_date, s.max_login_date, t.login_date
FROM segments s
JOIN table1 t ON t.user_id = s.user_id
             AND t.login_date BETWEEN s.min_login_date AND s.max_login_date
ORDER BY s.user_id, t.login_date;`,
    result: table(["user_id","login_date","rk","flag_date"], [
      ["A","2025-01-01","1","2024-12-31"],["A","2025-01-02","2","2024-12-31"],
      ["A","2025-01-03","3","2024-12-31"],["A","2025-01-05","4","2025-01-01"],
    ], 3),
    tip: "flag_date stays IDENTICAL for a true consecutive streak (2024-12-31 repeats 3 times) — that's the whole trick."
  },
  {
    title: "Variant: allow a 1-day gap",
    speak: "This version uses LAG to compute the gap in days between logins, flags any gap bigger than two days as a break, then uses a running sum of those flags to create segment IDs.",
    desc: "A more flexible version — tolerates small gaps instead of requiring exact consecutive dates.",
    sample: table(["user_id","login_date"], [["A","2025-01-01"],["A","2025-01-03"],["A","2025-01-05"],["A","2025-01-06"]]),
    code: `WITH login_diffs AS (
  SELECT user_id, login_date,
    DATEDIFF(login_date, LAG(login_date) OVER (PARTITION BY user_id ORDER BY login_date)) AS diff_days,
    CASE WHEN DATEDIFF(login_date, LAG(login_date) OVER (PARTITION BY user_id ORDER BY login_date)) > 2
         THEN 1 ELSE 0 END AS gap_flag
  FROM table1
),
segments AS (
  SELECT user_id, login_date,
    SUM(gap_flag) OVER (PARTITION BY user_id ORDER BY login_date) AS segment_id
  FROM login_diffs
)
SELECT user_id, segment_id,
  MIN(login_date) AS min_login_date,
  MAX(login_date) AS max_login_date,
  DATEDIFF(MAX(login_date), MIN(login_date)) + 1 AS continuous_days
FROM segments
GROUP BY user_id, segment_id
HAVING DATEDIFF(MAX(login_date), MIN(login_date)) + 1 >= 3;`,
    tip: "Running SUM() of a 0/1 flag is a common trick to create segment IDs — each new '1' starts a new segment."
  },
];

// ============================================================
// TAB 5 — SALES RANKING
// ============================================================
const rankingData = [
  {
    title: "Daily city sales ranking",
    speak: "First aggregate sales by city and date, then use three window functions together: ROW_NUMBER to rank cities within each day, SUM partitioned by date only for the daily total, and a cumulative SUM ordered by sales for the running total.",
    desc: "Three window functions in one query, each with a different PARTITION/ORDER combination.",
    sample: table(["order_id","city","order_date","sales"], [
      ["1","Beijing","2025-01-01","100"],["2","Shanghai","2025-01-01","150"],["3","Guangzhou","2025-01-01","120"],
      ["4","Beijing","2025-01-02","300"],["5","Shanghai","2025-01-02","250"],["6","Guangzhou","2025-01-02","180"],["7","Beijing","2025-01-02","50"],
    ]),
    code: `WITH aggregated AS (
  SELECT city, order_date, SUM(sales) AS daily_sales
  FROM orders
  GROUP BY city, order_date
)
SELECT
    order_date, city, daily_sales,
    ROW_NUMBER() OVER (PARTITION BY order_date ORDER BY daily_sales DESC) AS rank,
    SUM(daily_sales) OVER (PARTITION BY order_date) AS total,
    SUM(daily_sales) OVER (PARTITION BY order_date ORDER BY daily_sales DESC) AS cumulative
FROM aggregated
ORDER BY order_date, daily_sales DESC;`,
    result: table(["order_date","city","daily_sales","rank","total","cumulative"], [
      ["2025-01-01","Shanghai","150","1","370","150"],
      ["2025-01-01","Guangzhou","120","2","370","270"],
      ["2025-01-01","Beijing","100","3","370","370"],
      ["2025-01-02","Beijing","350","1","780","350"],
      ["2025-01-02","Shanghai","250","2","780","600"],
      ["2025-01-02","Guangzhou","180","3","780","780"],
    ]),
    tip: "Beijing has 2 rows on 2025-01-02 (300+50) — they get summed to 350 during the first aggregation step."
  },
  {
    title: "Top 3 operators per city per day",
    speak: "Sum sales by city, date, and operator first, then rank operators within each city-and-date group, and keep only the top 3.",
    desc: "Same ranking pattern as before, but partitioned by two columns instead of one.",
    sample: table(["order_id","city","order_date","operator_id","sales"], [
      ["1","Beijing","2025-01-01","101","200"],["2","Beijing","2025-01-01","101","300"],
      ["3","Beijing","2025-01-01","102","300"],["4","Beijing","2025-01-01","103","250"],
      ["5","Beijing","2025-01-01","104","100"],["6","Shanghai","2025-01-01","201","400"],
    ]),
    code: `WITH operator_sales AS (
    SELECT city, order_date, operator_id, SUM(sales) AS total_sales
    FROM orders
    GROUP BY city, order_date, operator_id
),
ranked AS (
    SELECT city, order_date, operator_id, total_sales,
        ROW_NUMBER() OVER (PARTITION BY city, order_date ORDER BY total_sales DESC) AS rn
    FROM operator_sales
)
SELECT city, order_date, operator_id, total_sales, rn
FROM ranked
WHERE rn <= 3
ORDER BY city, order_date, rn;`,
    tip: "PARTITION BY city, order_date — partitioning by TWO columns creates one ranking group per city-date combination."
  },
];

// ============================================================
// TAB 6 — RETENTION
// ============================================================
const retentionData = [
  {
    title: "Rolling vs Cohort retention — the concept",
    speak: "Rolling retention checks, for every day, whether today's active users came back within 30 days of their previous activity. Cohort retention groups users by their first-ever use date, then tracks whether that whole group comes back within a fixed future window.",
    desc: "The key conceptual difference before writing any SQL.",
    code: null,
    tip: "Rolling = 'check every day who came back.' Cohort = 'take a batch of new users and see how many return.'"
  },
  {
    title: "A) Rolling 30-day retention",
    speak: "Use LAG to get each seller's previous transaction date, compute the gap in days, then for each day count how many sellers were active, how many were even eligible to be repeaters, and how many actually returned within 30 days.",
    desc: "Gap-based approach — measures the gap between EACH pair of consecutive transactions.",
    sample: table(["seller_id","transaction_date","note"], [
      ["201","2024-01-02",""],["201","2024-01-20","← return within 30 days ✅"],["201","2024-02-02","← return within 30 days ✅"],
      ["202","2024-01-02",""],["202","2024-01-25","← return within 30 days ✅"],["203","2024-01-02","← no return ❌"],
    ]),
    code: `-- Step 1: previous date + gap
SELECT seller_id, transaction_date,
  LAG(transaction_date) OVER (PARTITION BY seller_id ORDER BY transaction_date) AS prev_date,
  DATEDIFF(transaction_date,
    LAG(transaction_date) OVER (PARTITION BY seller_id ORDER BY transaction_date)) AS gap_days
FROM transactions;

-- Step 2: daily retention rate
, daily AS (
  SELECT transaction_date,
    COUNT(*) AS total_active,
    COUNT(prev_date) AS eligible_repeaters,
    SUM(CASE WHEN gap_days <= 30 THEN 1 ELSE 0 END) AS retained
  FROM with_gap
  GROUP BY transaction_date
)
SELECT transaction_date, total_active, eligible_repeaters, retained,
  CASE WHEN eligible_repeaters = 0 THEN NULL
       ELSE ROUND(retained * 1.0 / eligible_repeaters, 2) END AS rate_among_eligible
FROM daily
ORDER BY transaction_date;`,
    tip: "eligible_repeaters excludes first-time transactions (they have no previous date to measure a gap from)."
  },
  {
    title: "B) Cohort 30-day retention",
    speak: "Anchor every seller to their very first transaction date — that's their cohort. Then check if they have any return transaction within 30 days after that anchor, collapse to a 0 or 1 flag per seller, and finally average those flags per cohort date.",
    desc: "Four-step process: anchor date, candidate returns, per-seller flag, cohort-level rate.",
    sample: table(["seller_id","transaction_date","note"], [
      ["201","2024-01-02",""],["201","2024-01-20","← within 30 days ✅"],["201","2024-02-02","← 31 days, NOT within 30 ❌"],
      ["202","2024-01-02",""],["202","2024-01-25","← within 30 days ✅"],["203","2024-01-02","← no return ❌"],
    ]),
    code: `-- Step 1: first transaction per seller (cohort anchor)
WITH first_txn AS (
  SELECT seller_id, MIN(transaction_date) AS first_date
  FROM transactions
  GROUP BY seller_id
),
-- Step 2: candidate returns within (0, 30] days after first_date
cand_returns AS (
  SELECT f.seller_id, f.first_date, t.transaction_date AS return_date,
    DATEDIFF(t.transaction_date, f.first_date) AS gap_days
  FROM first_txn f
  LEFT JOIN transactions t
    ON t.seller_id = f.seller_id
   AND DATEDIFF(t.transaction_date, f.first_date) BETWEEN 1 AND 30
),
-- Step 3: collapse to per-seller retained flag (0/1)
flags AS (
  SELECT seller_id, first_date,
    CASE WHEN COUNT(return_date) > 0 THEN 1 ELSE 0 END AS retained_30d
  FROM cand_returns
  GROUP BY seller_id, first_date
)
-- Step 4: final cohort retention rate
SELECT first_date AS cohort_date,
  COUNT(*) AS cohort_size,
  SUM(retained_30d) AS retained_30d,
  ROUND(SUM(retained_30d) * 1.0 / COUNT(*), 2) AS retention_rate_30d
FROM flags
GROUP BY first_date
ORDER BY cohort_date;`,
    result: table(["cohort_date","cohort_size","retained_30d","retention_rate_30d"], [
      ["2024-01-02","3","2","0.67"],["2024-03-01","1","1","1.00"],
    ]),
    tip: "The LEFT JOIN in Step 2 is essential — sellers with NO return still need a row (with a NULL return_date) so they correctly get flagged as 0 in Step 3."
  },
];

function renderTab(containerId, data) {
  const el = document.getElementById(containerId);
  el.innerHTML = data.map(item => {
    let html = `<div class="card">
      <div class="q-head">
        <p class="q-title">${item.title}</p>
        ${listenBtn(item.speak)}
      </div>
      <p class="q-desc">${item.desc}</p>`;
    if (item.diagram) {
      html += queryFlowSVG;
    }
    if (item.sample) {
      html += `<span class="step-label">Sample data</span>${item.sample}`;
    }
    if (item.code) {
      html += `<div class="codeblock">${highlightSQL(item.code)}</div>`;
    }
    if (item.result) {
      html += `<span class="step-label">Result</span>${item.result}`;
    }
    if (item.tip) {
      html += `<div class="tip">💡 ${item.tip}</div>`;
    }
    html += `</div>`;
    return html;
  }).join('');
}

function switchTab(tabId) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelector(`.tab-btn[data-tab="${tabId}"]`).classList.add('active');
  document.getElementById(tabId).classList.add('active');
}

});

document.addEventListener('click', (e) => {

  if (btn) toggleSpeak(btn);
});

// ============================================================
// TEXT-TO-SPEECH
// ============================================================
let voices = [];
let currentBtn = null;
const speechSupported = typeof window !== 'undefined' && 'speechSynthesis' in window;

function loadVoices() {
  if (!speechSupported) return;
  try {
    voices = window.speechSynthesis.getVoices().filter(v => v.lang.startsWith('en'));
    const select = document.getElementById('voiceSelect');
    if (!select) return;
    select.innerHTML = '';
    if (voices.length === 0) { select.innerHTML = '<option>Default English voice</option>'; return; }
    voices.forEach((v, i) => {
      const opt = document.createElement('option');
      opt.value = i;
      opt.textContent = `${v.name} (${v.lang})`;
      if (v.name.includes('Natural') || v.name.includes('Samantha') || v.name.includes('Google US English')) opt.selected = true;
      select.appendChild(opt);
    });
  } catch (e) { console.warn('Voice loading failed:', e); }
}
try {
  if (speechSupported) { window.speechSynthesis.onvoiceschanged = loadVoices; loadVoices(); }
} catch (e) { console.warn('Speech init failed:', e); }

const rateSlider = document.getElementById('rateSlider');
const rateLabel = document.getElementById('rateLabel');
if (rateSlider) rateSlider.addEventListener('input', () => { rateLabel.textContent = rateSlider.value + 'x'; });

function toggleSpeak(btn) {
  if (!speechSupported) { alert('Text-to-speech is not supported in this browser.'); return; }
  try {
    const text = decodeURIComponent(btn.dataset.text);
    if (btn.classList.contains('speaking')) {
      window.speechSynthesis.cancel();
      btn.classList.remove('speaking');
      currentBtn = null;
      return;
    }
    window.speechSynthesis.cancel();
    if (currentBtn) currentBtn.classList.remove('speaking');
    const utter = new SpeechSynthesisUtterance(text);
    const voiceIdx = document.getElementById('voiceSelect').value;
    if (voices[voiceIdx]) utter.voice = voices[voiceIdx];
    utter.lang = 'en-US';
    utter.rate = parseFloat(rateSlider.value);
    utter.onstart = () => { btn.classList.add('speaking'); currentBtn = btn; };
    utter.onend = () => { btn.classList.remove('speaking'); currentBtn = null; };
    utter.onerror = () => { btn.classList.remove('speaking'); currentBtn = null; };
    window.speechSynthesis.speak(utter);
  } catch (e) { console.warn('toggleSpeak failed:', e); }
}
const stopAllBtn = document.getElementById('stopAllBtn');
if (stopAllBtn) {
  stopAllBtn.addEventListener('click', () => {
    if (speechSupported) window.speechSynthesis.cancel();
    document.querySelectorAll('.listen-btn.speaking').forEach(b => b.classList.remove('speaking'));
    currentBtn = null;
  });
}
