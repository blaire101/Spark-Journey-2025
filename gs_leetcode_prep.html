function switchTab(tabId) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelector(`.tab-btn[data-tab="${tabId}"]`).classList.add('active');
  document.getElementById(tabId).classList.add('active');
}

function jumpTo(tabId, cardId) {
  switchTab(tabId);
  requestAnimationFrame(() => {
    setTimeout(() => {
      const card = document.getElementById(cardId);
      if (!card) {
        console.warn('jumpTo: could not find element with id', cardId);
        return;
      }
      card.scrollIntoView({ behavior: 'smooth', block: 'center' });
      card.style.transition = 'background 0.3s';
      card.style.background = 'var(--accent-bg)';
      setTimeout(() => { card.style.background = ''; }, 1500);
    }, 60);
  });
}


document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => switchTab(btn.dataset.tab));
});

// ---------- Global event delegation for data-action buttons ----------
// Using delegation instead of inline onclick="" avoids any environment-specific
// restrictions on inline event handler attributes, and is more robust overall.
document.addEventListener('click', (e) => {
  const btn = e.target.closest('[data-action]');
  if (!btn) return;

  const action = btn.dataset.action;

  if (action === 'speak') {
    toggleSpeak(btn);
  } else if (action === 'jump') {
    jumpTo(btn.dataset.jumpTab, btn.dataset.jumpCard);
  } else if (action === 'goto') {
    switchTab(btn.dataset.gotoTab);
  }
});

// ---------- Text-to-Speech ----------
let voices = [];
let currentUtterance = null;
let currentBtn = null;
const speechSupported = typeof window !== 'undefined' && 'speechSynthesis' in window;

function loadVoices() {
  if (!speechSupported) return;
  try {
    voices = window.speechSynthesis.getVoices().filter(v => v.lang.startsWith('en'));
    const select = document.getElementById('voiceSelect');
    if (!select) return;
    select.innerHTML = '';
    if (voices.length === 0) {
      select.innerHTML = '<option>Default English voice</option>';
      return;
    }
    voices.forEach((v, i) => {
      const opt = document.createElement('option');
      opt.value = i;
      opt.textContent = `${v.name} (${v.lang})`;
      if (v.name.includes('Natural') || v.name.includes('Samantha') || v.name.includes('Google US English')) {
        opt.selected = true;
      }
      select.appendChild(opt);
    });
  } catch (e) {
    console.warn('Voice loading failed (non-critical):', e);
  }
}

try {
  if (speechSupported) {
    window.speechSynthesis.onvoiceschanged = loadVoices;
    loadVoices();
  } else {
    const vsel = document.getElementById('voiceSelect');
    if (vsel) vsel.innerHTML = '<option>Speech not supported in this browser</option>';
  }
} catch (e) {
  console.warn('Speech synthesis init failed (non-critical):', e);
}

const rateSlider = document.getElementById('rateSlider');
const rateLabel = document.getElementById('rateLabel');
if (rateSlider) {
  rateSlider.addEventListener('input', () => {
    rateLabel.textContent = rateSlider.value + 'x';
  });
}

function toggleSpeak(btn) {
  if (!speechSupported) {
    alert('Text-to-speech is not supported in this browser.');
    return;
  }
  try {
    const text = decodeURIComponent(btn.dataset.text);

    if (btn.classList.contains('speaking')) {
      window.speechSynthesis.cancel();
      btn.classList.remove('speaking');
      currentBtn = null;
      return;
    }

    window.speechSynthesis.cancel();
    if (currentBtn) {
      currentBtn.classList.remove('speaking');
    }

    const utter = new SpeechSynthesisUtterance(text);
    const voiceIdx = document.getElementById('voiceSelect').value;
    if (voices[voiceIdx]) utter.voice = voices[voiceIdx];
    utter.lang = 'en-US';
    utter.rate = parseFloat(rateSlider.value);
    utter.pitch = 1.0;

    utter.onstart = () => {
      btn.classList.add('speaking');
      currentBtn = btn;
      currentUtterance = utter;
    };
    utter.onend = () => {
      btn.classList.remove('speaking');
      currentBtn = null;
    };
    utter.onerror = () => {
      btn.classList.remove('speaking');
      currentBtn = null;
    };

    window.speechSynthesis.speak(utter);
  } catch (e) {
    console.warn('toggleSpeak failed:', e);
  }
}

const stopAllBtn = document.getElementById('stopAllBtn');
if (stopAllBtn) {
  stopAllBtn.addEventListener('click', () => {
    if (speechSupported) window.speechSynthesis.cancel();
    document.querySelectorAll('.listen-btn.speaking').forEach(b => b.classList.remove('speaking'));
    currentBtn = null;
  });
}
