<svg viewBox="0 0 980 380" xmlns="http://www.w3.org/2000/svg" font-family="'Helvetica Neue', Arial, sans-serif">
  <rect width="980" height="380" fill="#fafafa"/>
  <text x="490" y="32" text-anchor="middle" font-size="16" font-weight="700" fill="#1f2d3d">HBase RowKey 设计：为什么不能直接用 user_id</text>

  <!-- 左：直接用user_id -->
  <rect x="40" y="60" width="420" height="290" rx="10" fill="#fff" stroke="#c0392b" stroke-width="2"/>
  <text x="250" y="90" text-anchor="middle" font-size="13" font-weight="700" fill="#c0392b">❌ RowKey = user_id（自增ID场景下会热点）</text>

  <rect x="70" y="110" width="360" height="130" fill="white" stroke="#c9d2dc"/>
  <text x="250" y="130" text-anchor="middle" font-size="11" fill="#5b6472">若 user_id 是自增数字：1000001, 1000002...</text>
  <rect x="80" y="140" width="100" height="25" fill="#fdecea"/>
  <text x="130" y="157" text-anchor="middle" font-size="10">Region A</text>
  <rect x="190" y="140" width="100" height="25" fill="#fdecea"/>
  <text x="240" y="157" text-anchor="middle" font-size="10">Region B</text>
  <rect x="300" y="140" width="100" height="25" fill="#c0392b"/>
  <text x="350" y="157" text-anchor="middle" font-size="10" fill="white">Region C ← 最新数据全落这</text>
  <text x="250" y="200" text-anchor="middle" font-size="11" fill="#c0392b">新用户 ID 连续递增，写入全部打到</text>
  <text x="250" y="218" text-anchor="middle" font-size="11" fill="#c0392b">同一个 Region，形成"热点写"</text>

  <text x="250" y="270" text-anchor="middle" font-size="11" fill="#7a2119">其他 Region 空闲，一个 Region 扛全部压力</text>
  <text x="250" y="290" text-anchor="middle" font-size="11" fill="#7a2119">大表全量刷新时尤其明显</text>
  <text x="250" y="325" text-anchor="middle" font-size="12" font-weight="700" fill="#c0392b">👎 RegionServer 负载不均衡</text>

  <!-- 右：加盐 -->
  <rect x="520" y="60" width="420" height="290" rx="10" fill="#fff" stroke="#2f9e6e" stroke-width="2"/>
  <text x="730" y="90" text-anchor="middle" font-size="13" font-weight="700" fill="#2f9e6e">✅ RowKey = hash前缀(2位) + user_id</text>

  <rect x="550" y="110" width="360" height="130" fill="white" stroke="#c9d2dc"/>
  <text x="730" y="130" text-anchor="middle" font-size="11" fill="#5b6472">例：MD5(user_id) 取前2位当前缀</text>
  <rect x="560" y="140" width="100" height="25" fill="#e8f8ef"/>
  <text x="610" y="157" text-anchor="middle" font-size="10">Region A ← 3f_1000002</text>
  <rect x="670" y="140" width="100" height="25" fill="#e8f8ef"/>
  <text x="720" y="157" text-anchor="middle" font-size="10">Region B ← 8a_1000001</text>
  <rect x="780" y="140" width="100" height="25" fill="#e8f8ef"/>
  <text x="830" y="157" text-anchor="middle" font-size="10">Region C ← c2_1000003</text>
  <text x="730" y="200" text-anchor="middle" font-size="11" fill="#155d3a">同样连续递增的 user_id，加盐之后</text>
  <text x="730" y="218" text-anchor="middle" font-size="11" fill="#155d3a">被均匀打散到不同 Region</text>

  <text x="730" y="270" text-anchor="middle" font-size="11" fill="#155d3a">代价：按前缀范围扫描会变复杂</text>
  <text x="730" y="290" text-anchor="middle" font-size="11" fill="#155d3a">但你这个场景只做单点查询，不受影响</text>
  <text x="730" y="325" text-anchor="middle" font-size="12" font-weight="700" fill="#155d3a">👍 写入均匀分布，推荐使用</text>
</svg>
