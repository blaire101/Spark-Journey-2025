<svg viewBox="0 0 980 520" xmlns="http://www.w3.org/2000/svg" font-family="'Helvetica Neue', Arial, sans-serif">
  <defs>
    <marker id="a1" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#5b6472"/>
    </marker>
  </defs>
  <rect width="980" height="520" fill="#fafafa"/>
  <text x="490" y="32" text-anchor="middle" font-size="16" font-weight="700" fill="#1f2d3d">方案对比：Flink 直连 Hive Lookup Join  vs  经过 HBase 中转</text>

  <!-- 左：旧方案 -->
  <rect x="40" y="60" width="420" height="420" rx="10" fill="#fff" stroke="#c0392b" stroke-width="2"/>
  <text x="250" y="90" text-anchor="middle" font-size="14" font-weight="700" fill="#c0392b">❌ 旧方案：Flink 直查 Hive</text>

  <rect x="80" y="110" width="340" height="50" rx="6" fill="#fdecea"/>
  <text x="250" y="140" text-anchor="middle" font-size="12" fill="#7a2119">dwd_user_first_payment_t1（Hive）</text>

  <path d="M250,160 L250,190" stroke="#5b6472" stroke-width="2" marker-end="url(#a1)"/>
  <text x="330" y="180" font-size="11" fill="#c0392b">每条流数据都要查一次</text>

  <rect x="80" y="190" width="340" height="60" rx="6" fill="#fdecea"/>
  <text x="250" y="215" text-anchor="middle" font-size="12" font-weight="600" fill="#7a2119">Flink Lookup Join</text>
  <text x="250" y="233" text-anchor="middle" font-size="11" fill="#7a2119">streaming-source.enable=false</text>

  <rect x="80" y="280" width="340" height="180" rx="6" fill="#fff5f4" stroke="#e8a49b"/>
  <text x="250" y="305" text-anchor="middle" font-size="12" font-weight="700" fill="#c0392b">问题清单</text>
  <text x="100" y="330" font-size="11" fill="#7a2119">① 全表/整分区加载进 TM 内存</text>
  <text x="100" y="352" font-size="11" fill="#7a2119">② 千万级以上用户 → OOM 风险</text>
  <text x="100" y="374" font-size="11" fill="#7a2119">③ 缓存过期要重新扫一次 HDFS</text>
  <text x="100" y="396" font-size="11" fill="#7a2119">④ Hive 为批量扫描设计，不是为</text>
  <text x="110" y="414" font-size="11" fill="#7a2119">高频点查设计</text>
  <text x="100" y="436" font-size="11" fill="#7a2119">⑤ 作业冷启动慢（等维表全量加载）</text>

  <!-- 右：新方案 -->
  <rect x="520" y="60" width="420" height="420" rx="10" fill="#fff" stroke="#2f9e6e" stroke-width="2"/>
  <text x="730" y="90" text-anchor="middle" font-size="14" font-weight="700" fill="#2f9e6e">✅ 新方案：中间加一层 HBase</text>

  <rect x="560" y="110" width="340" height="50" rx="6" fill="#e8f8ef"/>
  <text x="730" y="140" text-anchor="middle" font-size="12" fill="#155d3a">dwd_user_first_payment_t1（Hive）</text>

  <path d="M730,160 L730,185" stroke="#5b6472" stroke-width="2" marker-end="url(#a1)"/>
  <text x="820" y="177" font-size="11" fill="#2f9e6e">每天同步一次（批量）</text>

  <rect x="560" y="185" width="340" height="50" rx="6" fill="#e8f8ef"/>
  <text x="730" y="215" text-anchor="middle" font-size="12" font-weight="600" fill="#155d3a">HBase 表：dim:user_first_pay</text>

  <path d="M730,235 L730,260" stroke="#5b6472" stroke-width="2" marker-end="url(#a1)"/>
  <text x="850" y="252" font-size="11" fill="#2f9e6e">毫秒级点查</text>

  <rect x="560" y="260" width="340" height="50" rx="6" fill="#e8f8ef"/>
  <text x="730" y="290" text-anchor="middle" font-size="12" font-weight="600" fill="#155d3a">Flink Lookup Join（查 HBase）</text>

  <rect x="560" y="330" width="340" height="130" rx="6" fill="#f4fcf7" stroke="#a8dbc0"/>
  <text x="730" y="355" text-anchor="middle" font-size="12" font-weight="700" fill="#155d3a">收益清单</text>
  <text x="580" y="380" font-size="11" fill="#155d3a">① 按 RowKey 精确查，不用整表加载</text>
  <text x="580" y="402" font-size="11" fill="#155d3a">② 延迟从"秒级扫描"降到"毫秒点查"</text>
  <text x="580" y="424" font-size="11" fill="#155d3a">③ HBase 原生支持水平扩展，抗高 QPS</text>
  <text x="580" y="446" font-size="11" fill="#155d3a">④ 跟 Hadoop 生态一体，无额外运维成本</text>

  <text x="490" y="500" text-anchor="middle" font-size="12" fill="#5b6472">Hive T-1 表依然是"权威数据源"，HBase 只是它面向 Flink 的一份"高速查询副本"</text>
</svg>
