<svg viewBox="0 0 900 380" xmlns="http://www.w3.org/2000/svg" font-family="'Helvetica Neue', Arial, sans-serif">
  <defs>
    <marker id="ap2" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#5b6472"/>
    </marker>
  </defs>
  <rect width="900" height="380" fill="#fafafa"/>
  <text x="450" y="32" text-anchor="middle" font-size="16" font-weight="700" fill="#1f2d3d">流内去重：同一用户今天分订金+尾款两笔缴费</text>

  <text x="220" y="65" text-anchor="middle" font-size="13" font-weight="600" fill="#3b6ea5">Kafka 流入的原始缴费事件</text>
  <rect x="60" y="80" width="320" height="150" fill="white" stroke="#c9d2dc"/>
  <line x1="60" y1="110" x2="380" y2="110" stroke="#c9d2dc"/>
  <line x1="60" y1="140" x2="380" y2="140" stroke="#c9d2dc"/>
  <line x1="60" y1="170" x2="380" y2="170" stroke="#c9d2dc"/>
  <line x1="60" y1="200" x2="380" y2="200" stroke="#c9d2dc"/>
  <line x1="220" y1="80" x2="220" y2="230" stroke="#c9d2dc"/>
  <text x="140" y="100" text-anchor="middle" font-size="11" font-weight="600">user_id</text>
  <text x="300" y="100" text-anchor="middle" font-size="11" font-weight="600">pay_time / order</text>

  <rect x="62" y="142" width="316" height="28" fill="#fff3cd"/>
  <text x="140" y="160" text-anchor="middle" font-size="11" font-weight="700">u_7001</text>
  <text x="300" y="160" text-anchor="middle" font-size="11" font-weight="700">09:00 订金 ⭐最早</text>

  <text x="140" y="190" text-anchor="middle" font-size="11">u_7001</text>
  <text x="300" y="190" text-anchor="middle" font-size="11">15:30 尾款</text>

  <text x="140" y="220" text-anchor="middle" font-size="11">u_8002</text>
  <text x="300" y="220" text-anchor="middle" font-size="11">10:00 全款</text>

  <path d="M400,155 L500,155" stroke="#5b6472" stroke-width="2" marker-end="url(#ap2)"/>
  <text x="450" y="140" text-anchor="middle" font-size="10" fill="#5b6472">ROW_NUMBER 取最早一条</text>

  <text x="700" y="65" text-anchor="middle" font-size="13" font-weight="600" fill="#2f9e6e">去重后：每人只留最早一笔</text>
  <rect x="540" y="80" width="320" height="110" fill="white" stroke="#c9d2dc"/>
  <line x1="540" y1="110" x2="860" y2="110" stroke="#c9d2dc"/>
  <line x1="540" y1="140" x2="860" y2="140" stroke="#c9d2dc"/>
  <line x1="700" y1="80" x2="700" y2="190" stroke="#c9d2dc"/>
  <text x="620" y="100" text-anchor="middle" font-size="11" font-weight="600">user_id</text>
  <text x="780" y="100" text-anchor="middle" font-size="11" font-weight="600">today_first_pay_time</text>

  <rect x="542" y="112" width="316" height="26" fill="#d4f4e2"/>
  <text x="620" y="130" text-anchor="middle" font-size="11" font-weight="700">u_7001</text>
  <text x="780" y="130" text-anchor="middle" font-size="11" font-weight="700">09:00（订金那笔）</text>

  <text x="620" y="160" text-anchor="middle" font-size="11">u_8002</text>
  <text x="780" y="160" text-anchor="middle" font-size="11">10:00</text>

  <text x="450" y="270" text-anchor="middle" font-size="12" fill="#c0392b">⚠️ 业务含义：判断"首次支付"通常看第一笔实际到账记录（订金），</text>
  <text x="450" y="290" text-anchor="middle" font-size="12" fill="#c0392b">而不是等尾款付完才算，具体口径需要和业务方确认</text>
  <text x="450" y="330" text-anchor="middle" font-size="11" fill="#5b6472">这个输出同样是 changelog 流（可能撤回再更新），不是纯追加流</text>
</svg>
