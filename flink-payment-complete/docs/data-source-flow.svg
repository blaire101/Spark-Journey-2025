<svg viewBox="0 0 980 380" xmlns="http://www.w3.org/2000/svg" font-family="'Helvetica Neue', Arial, sans-serif">
  <defs>
    <marker id="ap1" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#5b6472"/>
    </marker>
  </defs>
  <rect width="980" height="380" fill="#fafafa"/>
  <text x="490" y="32" text-anchor="middle" font-size="16" font-weight="700" fill="#1f2d3d">数据源全景：从 MySQL 缴费表到 Flink 作业</text>

  <!-- MySQL -->
  <rect x="30" y="80" width="180" height="70" rx="8" fill="#3b6ea5"/>
  <text x="120" y="108" text-anchor="middle" fill="white" font-size="13" font-weight="600">MySQL</text>
  <text x="120" y="127" text-anchor="middle" fill="#dce8f7" font-size="11">study_abroad_payment 表</text>
  <text x="120" y="142" text-anchor="middle" fill="#dce8f7" font-size="10">每次缴费一条 INSERT</text>

  <path d="M210,115 L280,115" stroke="#5b6472" stroke-width="2" marker-end="url(#ap1)"/>
  <text x="245" y="100" text-anchor="middle" font-size="10" fill="#5b6472">binlog</text>

  <!-- Canal/CDC -->
  <rect x="280" y="80" width="150" height="70" rx="8" fill="#8e44ad"/>
  <text x="355" y="108" text-anchor="middle" fill="white" font-size="13" font-weight="600">CDC 采集</text>
  <text x="355" y="127" text-anchor="middle" fill="#f0e0f7" font-size="10">Canal / Debezium</text>
  <text x="355" y="142" text-anchor="middle" fill="#f0e0f7" font-size="10">解析 binlog 生成事件</text>

  <path d="M430,115 L500,115" stroke="#5b6472" stroke-width="2" marker-end="url(#ap1)"/>

  <!-- Kafka -->
  <rect x="500" y="80" width="200" height="70" rx="8" fill="#2f9e6e"/>
  <text x="600" y="108" text-anchor="middle" fill="white" font-size="13" font-weight="600">Kafka Topic</text>
  <text x="600" y="127" text-anchor="middle" fill="#dcf5e8" font-size="10">study_abroad_payment_events</text>
  <text x="600" y="142" text-anchor="middle" fill="#dcf5e8" font-size="10">唯一数据入口，全公司共享</text>

  <path d="M600,150 L600,190" stroke="#5b6472" stroke-width="2" marker-end="url(#ap1)"/>

  <!-- 消费者分叉 -->
  <text x="600" y="205" text-anchor="middle" font-size="11" fill="#c0392b" font-weight="600">两个独立 Consumer Group 各读一份</text>

  <rect x="380" y="220" width="200" height="60" rx="8" fill="#eaf1fb" stroke="#3b6ea5"/>
  <text x="480" y="245" text-anchor="middle" font-size="12" fill="#1f3a5f" font-weight="600">批处理：Hive/Spark</text>
  <text x="480" y="263" text-anchor="middle" font-size="10" fill="#1f3a5f">落 ODS → 聚合 DWD T-1 表</text>

  <rect x="620" y="220" width="200" height="60" rx="8" fill="#e8f8ef" stroke="#2f9e6e"/>
  <text x="720" y="245" text-anchor="middle" font-size="12" fill="#155d3a" font-weight="600">实时：Flink SQL 作业</text>
  <text x="720" y="263" text-anchor="middle" font-size="10" fill="#155d3a">今天0点起，判断首次支付</text>

  <path d="M600,190 L480,220" stroke="#5b6472" stroke-width="1.5"/>
  <path d="M600,190 L720,220" stroke="#5b6472" stroke-width="1.5"/>

  <text x="490" y="330" text-anchor="middle" font-size="12" fill="#5b6472">MySQL 是唯一权威来源；Kafka 是所有下游共享的"数据总线"；批和实时各自独立消费，互不阻塞</text>
</svg>
