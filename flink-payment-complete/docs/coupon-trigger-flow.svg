<svg viewBox="0 0 900 380" xmlns="http://www.w3.org/2000/svg" font-family="'Helvetica Neue', Arial, sans-serif">
  <defs>
    <marker id="ap3" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#5b6472"/>
    </marker>
  </defs>
  <rect width="900" height="380" fill="#fafafa"/>
  <text x="450" y="32" text-anchor="middle" font-size="16" font-weight="700" fill="#1f2d3d">最后一步：判定首次支付 → 触发发券 → 幂等兜底</text>

  <rect x="60" y="70" width="220" height="55" rx="8" fill="#2f9e6e"/>
  <text x="170" y="93" text-anchor="middle" fill="white" font-size="12" font-weight="600">Flink 判定：is_first_pay_today</text>
  <text x="170" y="111" text-anchor="middle" fill="white" font-size="11">= true</text>

  <path d="M280,97 L340,97" stroke="#5b6472" stroke-width="2" marker-end="url(#ap3)"/>

  <rect x="340" y="70" width="220" height="55" rx="8" fill="#3b6ea5"/>
  <text x="450" y="93" text-anchor="middle" fill="white" font-size="12" font-weight="600">写入 upsert-kafka</text>
  <text x="450" y="111" fill="white" text-anchor="middle" font-size="11">first_pay_coupon_trigger</text>

  <path d="M560,97 L620,97" stroke="#5b6472" stroke-width="2" marker-end="url(#ap3)"/>

  <rect x="620" y="70" width="220" height="55" rx="8" fill="#8e44ad"/>
  <text x="730" y="93" text-anchor="middle" fill="white" font-size="12" font-weight="600">发券服务消费</text>
  <text x="730" y="111" fill="white" text-anchor="middle" font-size="11">收到一条即触发发券</text>

  <path d="M730,125 L730,165" stroke="#5b6472" stroke-width="2" marker-end="url(#ap3)"/>

  <rect x="560" y="165" width="340" height="80" rx="8" fill="#fdecea" stroke="#c0392b"/>
  <text x="730" y="190" text-anchor="middle" font-size="12" font-weight="700" fill="#c0392b">⚠️ Kafka at-least-once 可能重复消费</text>
  <text x="580" y="212" font-size="11" fill="#7a2119">发券服务收到消息后，先查 Redis：</text>
  <text x="580" y="230" font-size="11" fill="#7a2119">SETNX coupon:user_id:活动ID  → 已存在则跳过，不重复发</text>

  <rect x="60" y="270" width="780" height="80" rx="8" fill="#fff" stroke="#c9d2dc"/>
  <text x="450" y="295" text-anchor="middle" font-size="12" font-weight="700" fill="#1f2d3d">全链路一致性小结</text>
  <text x="80" y="318" font-size="11" fill="#5b6472">Flink 侧：Hive/HBase 保证"首次支付"判断本身准确（最终一致，容忍T-1修正）</text>
  <text x="80" y="338" font-size="11" fill="#5b6472">发券侧：用轻量级 Redis SETNX 做最后一道幂等闸门，防止消息重复导致重复发券</text>
</svg>
