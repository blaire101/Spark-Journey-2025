<svg viewBox="0 0 1000 420" xmlns="http://www.w3.org/2000/svg" font-family="'Helvetica Neue', Arial, sans-serif">
  <defs>
    <marker id="bc1" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#5b6472"/>
    </marker>
  </defs>
  <rect width="1000" height="420" fill="#fafafa"/>
  <text x="500" y="30" text-anchor="middle" font-size="16" font-weight="700" fill="#1f2d3d">大盘数据来源三段拼接：历史回刷 + 实时 + 每天T-1校准</text>

  <!-- 时间轴 -->
  <line x1="60" y1="90" x2="940" y2="90" stroke="#c9d2dc" stroke-width="2"/>
  <text x="150" y="75" text-anchor="middle" font-size="11" fill="#5b6472">2026-01-01</text>
  <text x="450" y="75" text-anchor="middle" font-size="11" fill="#5b6472">2026-07-01(上线)</text>
  <text x="800" y="75" text-anchor="middle" font-size="11" fill="#5b6472">昨天</text>
  <text x="920" y="75" text-anchor="middle" font-size="11" fill="#5b6472">今天</text>

  <!-- 段1：历史回刷 -->
  <rect x="60" y="100" width="390" height="50" rx="6" fill="#eaf1fb" stroke="#3b6ea5"/>
  <text x="255" y="122" text-anchor="middle" font-size="12" font-weight="700" fill="#1f3a5f">① 一次性历史回刷</text>
  <text x="255" y="140" text-anchor="middle" font-size="10" fill="#1f3a5f">从ODS明细算1-6月，只跑一次，永久准确</text>

  <!-- 段2：实时+校准 -->
  <rect x="450" y="100" width="350" height="50" rx="6" fill="#e8f8ef" stroke="#2f9e6e"/>
  <text x="625" y="122" text-anchor="middle" font-size="12" font-weight="700" fill="#155d3a">② 实时写入 + 每天凌晨T-1校准覆盖</text>
  <text x="625" y="140" text-anchor="middle" font-size="10" fill="#155d3a">昨天及更早的每一天，都已被校准成准确值</text>

  <!-- 段3：今天 -->
  <rect x="800" y="100" width="140" height="50" rx="6" fill="#fff3cd" stroke="#e6a817"/>
  <text x="870" y="122" text-anchor="middle" font-size="12" font-weight="700" fill="#8a6d1f">③ 今天</text>
  <text x="870" y="140" text-anchor="middle" font-size="10" fill="#8a6d1f">只有实时近似值</text>

  <!-- 详细说明 -->
  <rect x="60" y="180" width="880" height="90" rx="8" fill="white" stroke="#c9d2dc"/>
  <text x="80" y="205" font-size="12" font-weight="700" fill="#1f2d3d">作业⑤ HourlyPayStatsJob（常驻实时）</text>
  <text x="80" y="225" font-size="11" fill="#5b6472">Watermark只等5秒，超过5秒才到的迟到数据默认丢弃，所以实时算出来的数字是"近似值"</text>
  <text x="80" y="248" font-size="12" font-weight="700" fill="#1f2d3d">作业⑥ HourlyStatsCalibrationJob（每天02:00定时批处理，新增）</text>
  <text x="80" y="265" font-size="11" fill="#5b6472">用完整的ODS明细重算"昨天"，INSERT OVERWRITE覆盖掉实时写入的近似值，变成准确值</text>

  <!-- 覆盖箭头 -->
  <path d="M870,150 C 870,300 625,300 625,150" stroke="#c0392b" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#bc1)"/>
  <text x="750" y="320" text-anchor="middle" font-size="11" fill="#c0392b">明天凌晨，今天这段会被覆盖修正</text>

  <text x="500" y="370" text-anchor="middle" font-size="12" fill="#1f2d3d" font-weight="700">越往前的数据越"沉淀"成准确值，只有"今天"是唯一还没定稿的一天</text>
  <text x="500" y="392" text-anchor="middle" font-size="11" fill="#5b6472">Sink表必须支持按 window_start 覆盖写入，不能是纯追加，否则会重复</text>
</svg>
