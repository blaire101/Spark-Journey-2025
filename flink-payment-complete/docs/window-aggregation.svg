<svg viewBox="0 0 1000 460" xmlns="http://www.w3.org/2000/svg" font-family="'Helvetica Neue', Arial, sans-serif">
  <defs>
    <marker id="wa1" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#5b6472"/>
    </marker>
  </defs>
  <rect width="1000" height="460" fill="#fafafa"/>
  <text x="500" y="30" text-anchor="middle" font-size="16" font-weight="700" fill="#1f2d3d">滚动窗口（TUMBLE）：按小时统计缴费笔数和金额</text>

  <!-- 时间轴 -->
  <line x1="60" y1="80" x2="940" y2="80" stroke="#c9d2dc" stroke-width="2"/>
  <text x="200" y="65" text-anchor="middle" font-size="11" fill="#5b6472">09:00</text>
  <text x="500" y="65" text-anchor="middle" font-size="11" fill="#5b6472">10:00</text>
  <text x="800" y="65" text-anchor="middle" font-size="11" fill="#5b6472">11:00</text>

  <!-- 窗口1 -->
  <rect x="200" y="60" width="300" height="40" fill="#eaf1fb" opacity="0.6"/>
  <text x="350" y="115" text-anchor="middle" font-size="11" fill="#3b6ea5" font-weight="600">窗口①：[09:00, 10:00)</text>

  <!-- events in window1 -->
  <circle cx="240" cy="80" r="5" fill="#3b6ea5"/>
  <text x="240" y="140" text-anchor="middle" font-size="9">09:05 ¥5000</text>
  <circle cx="320" cy="80" r="5" fill="#3b6ea5"/>
  <text x="320" y="140" text-anchor="middle" font-size="9">09:30 ¥30000</text>
  <circle cx="460" cy="80" r="5" fill="#3b6ea5"/>
  <text x="460" y="140" text-anchor="middle" font-size="9">09:58 ¥8000</text>

  <!-- 窗口2 -->
  <rect x="500" y="60" width="300" height="40" fill="#e8f8ef" opacity="0.6"/>
  <text x="650" y="115" text-anchor="middle" font-size="11" fill="#2f9e6e" font-weight="600">窗口②：[10:00, 11:00)</text>
  <circle cx="540" cy="80" r="5" fill="#2f9e6e"/>
  <text x="540" y="140" text-anchor="middle" font-size="9">10:02 ¥45000</text>
  <circle cx="700" cy="80" r="5" fill="#2f9e6e"/>
  <text x="700" y="140" text-anchor="middle" font-size="9">10:40 ¥12000</text>

  <!-- 迟到数据 -->
  <circle cx="480" cy="80" r="5" fill="#c0392b"/>
  <text x="480" y="160" text-anchor="middle" font-size="9" fill="#c0392b">⚠️ 09:55事件</text>
  <text x="480" y="175" text-anchor="middle" font-size="9" fill="#c0392b">网络延迟到10:03才到达</text>
  <path d="M480,90 L480,105" stroke="#c0392b" stroke-width="1.5" marker-end="url(#wa1)"/>

  <!-- Watermark 推进线 -->
  <line x1="60" y1="200" x2="940" y2="200" stroke="#c9d2dc" stroke-width="2"/>
  <text x="70" y="195" font-size="11" fill="#8e44ad" font-weight="600">Watermark 推进（= 已见最大EventTime - 5秒）</text>
  <path d="M460,80 C 470,180 500,190 505,200" stroke="#8e44ad" stroke-width="1.5" stroke-dasharray="3,2"/>
  <polygon points="505,200 498,192 512,192" fill="#8e44ad"/>
  <text x="505" y="220" text-anchor="middle" font-size="10" fill="#8e44ad">Watermark到达10:00时，</text>
  <text x="505" y="235" text-anchor="middle" font-size="10" fill="#8e44ad">触发窗口①计算并输出结果</text>

  <!-- 结果表 -->
  <rect x="150" y="270" width="700" height="150" rx="8" fill="white" stroke="#c9d2dc"/>
  <text x="500" y="295" text-anchor="middle" font-size="12" font-weight="700" fill="#1f2d3d">窗口①触发时的计算结果</text>
  <line x1="150" y1="305" x2="850" y2="305" stroke="#c9d2dc"/>
  <line x1="150" y1="335" x2="850" y2="335" stroke="#c9d2dc"/>
  <line x1="380" y1="305" x2="380" y2="420" stroke="#c9d2dc"/>
  <line x1="580" y1="305" x2="580" y2="420" stroke="#c9d2dc"/>
  <text x="265" y="322" text-anchor="middle" font-size="11" font-weight="600">window</text>
  <text x="480" y="322" text-anchor="middle" font-size="11" font-weight="600">pay_count</text>
  <text x="715" y="322" text-anchor="middle" font-size="11" font-weight="600">pay_amount</text>
  <text x="265" y="352" text-anchor="middle" font-size="11">[09:00, 10:00)</text>
  <text x="480" y="352" text-anchor="middle" font-size="11">3笔</text>
  <text x="715" y="352" text-anchor="middle" font-size="11">¥43000</text>

  <text x="500" y="395" text-anchor="middle" font-size="11" fill="#c0392b">⚠️ 09:55那笔延迟到10:03才到，此时窗口①早已触发计算并输出，</text>
  <text x="500" y="412" text-anchor="middle" font-size="11" fill="#c0392b">默认会被直接丢弃，不会补算进窗口①的结果里</text>
</svg>
