<svg viewBox="0 0 1000 480" xmlns="http://www.w3.org/2000/svg" font-family="'Helvetica Neue', Arial, sans-serif">
  <defs>
    <marker id="tl1" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#5b6472"/>
    </marker>
  </defs>
  <rect width="1000" height="480" fill="#fafafa"/>
  <text x="500" y="32" text-anchor="middle" font-size="16" font-weight="700" fill="#1f2d3d">4 个作业的运行方式：谁常驻、谁定时</text>

  <!-- 时间轴 -->
  <line x1="80" y1="80" x2="920" y2="80" stroke="#c9d2dc" stroke-width="2"/>
  <text x="80" y="65" font-size="11" fill="#5b6472">00:00</text>
  <text x="280" y="65" font-size="11" fill="#5b6472">02:00</text>
  <text x="380" y="65" font-size="11" fill="#5b6472">02:30</text>
  <text x="920" y="65" text-anchor="end" font-size="11" fill="#5b6472">24:00（次日 00:00）</text>

  <circle cx="280" cy="80" r="4" fill="#3b6ea5"/>
  <circle cx="380" cy="80" r="4" fill="#8e44ad"/>

  <!-- 常驻作业①去重 -->
  <rect x="80" y="110" width="840" height="60" rx="8" fill="#e8f8ef" stroke="#2f9e6e" stroke-width="2"/>
  <text x="100" y="132" font-size="13" font-weight="700" fill="#155d3a">🟢 作业① DedupFirstPayJob（常驻，7×24小时不停）</text>
  <text x="100" y="152" font-size="11" fill="#155d3a">从 Kafka 原始缴费流实时去重，一次提交，永久运行，靠 Checkpoint 记录消费进度</text>

  <!-- 常驻作业②判断触发 -->
  <rect x="80" y="180" width="840" height="60" rx="8" fill="#e8f8ef" stroke="#2f9e6e" stroke-width="2"/>
  <text x="100" y="202" font-size="13" font-weight="700" fill="#155d3a">🟢 作业② FirstPayCouponTriggerJob（常驻，7×24小时不停）</text>
  <text x="100" y="222" font-size="11" fill="#155d3a">实时查 HBase 判断首次支付并触发发券，一次提交，永久运行</text>

  <!-- 定时批处理③ Hive T-1 -->
  <rect x="230" y="260" width="200" height="60" rx="8" fill="#eaf1fb" stroke="#3b6ea5" stroke-width="2"/>
  <text x="330" y="282" text-anchor="middle" font-size="12" font-weight="700" fill="#1f3a5f">🔵 作业③ Hive T-1 批合并</text>
  <text x="330" y="300" text-anchor="middle" font-size="11" fill="#1f3a5f">每天 02:00 定时触发一次</text>
  <path d="M280,260 L280,90" stroke="#3b6ea5" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#tl1)"/>

  <!-- 定时批处理④ Bulk Load -->
  <rect x="450" y="260" width="200" height="60" rx="8" fill="#f0e6f7" stroke="#8e44ad" stroke-width="2"/>
  <text x="550" y="282" text-anchor="middle" font-size="12" font-weight="700" fill="#5b2c73">🟣 作业④ Spark Bulk Load</text>
  <text x="550" y="300" text-anchor="middle" font-size="11" fill="#5b2c73">每天 02:30 定时触发一次</text>
  <path d="M380,260 L380,90" stroke="#8e44ad" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#tl1)"/>

  <path d="M330,260 L330,240" stroke="#5b6472" stroke-width="1.5" marker-end="url(#tl1)"/>
  <text x="390" y="252" text-anchor="middle" font-size="10" fill="#5b6472">③完成后触发④</text>

  <!-- 说明框 -->
  <rect x="80" y="350" width="840" height="110" rx="8" fill="#fff" stroke="#c9d2dc"/>
  <text x="100" y="375" font-size="12" font-weight="700" fill="#1f2d3d">关键区别</text>
  <text x="100" y="398" font-size="11" fill="#5b6472">🟢 常驻作业（①②）：只提交一次，Flink 集群持续运行，不需要每天重启，靠 group-offsets 自动接续消费</text>
  <text x="100" y="418" font-size="11" fill="#5b6472">🔵🟣 定时作业（③④）：用调度平台（Airflow/DolphinScheduler）每天定时触发一次，跑完即结束，不常驻</text>
  <text x="100" y="438" font-size="11" fill="#c0392b">③④ 的产出（更新后的HBase数据）会被 ①②"自动"用上——因为①②是常驻查询，不需要重启就能读到最新维表</text>
</svg>
