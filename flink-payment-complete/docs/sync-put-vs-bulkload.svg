<svg viewBox="0 0 980 460" xmlns="http://www.w3.org/2000/svg" font-family="'Helvetica Neue', Arial, sans-serif">
  <defs>
    <marker id="a2" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#5b6472"/>
    </marker>
  </defs>
  <rect width="980" height="460" fill="#fafafa"/>
  <text x="490" y="32" text-anchor="middle" font-size="16" font-weight="700" fill="#1f2d3d">每天把 Hive T-1 表灌进 HBase：两种方式对比</text>

  <!-- 左：Put方式 -->
  <rect x="40" y="60" width="420" height="370" rx="10" fill="#fff" stroke="#e67e22" stroke-width="2"/>
  <text x="250" y="90" text-anchor="middle" font-size="14" font-weight="700" fill="#e67e22">方式一：逐行 Put（简单但慢）</text>

  <rect x="70" y="110" width="360" height="40" rx="6" fill="#fef2e6"/>
  <text x="250" y="135" text-anchor="middle" font-size="12">Spark 读 Hive T-1 表</text>
  <path d="M250,150 L250,175" stroke="#5b6472" stroke-width="2" marker-end="url(#a2)"/>

  <rect x="70" y="175" width="360" height="40" rx="6" fill="#fef2e6"/>
  <text x="250" y="200" text-anchor="middle" font-size="12">每一行调用 HBase Put API</text>
  <path d="M250,215 L250,240" stroke="#5b6472" stroke-width="2" marker-end="url(#a2)"/>

  <rect x="70" y="240" width="360" height="40" rx="6" fill="#fef2e6"/>
  <text x="250" y="265" text-anchor="middle" font-size="12">走 RegionServer 正常写路径</text>

  <rect x="70" y="300" width="360" height="115" rx="6" fill="#fffaf3" stroke="#f0c896"/>
  <text x="250" y="322" text-anchor="middle" font-size="12" font-weight="700" fill="#c07a1f">特点</text>
  <text x="90" y="345" font-size="11" fill="#7a5416">✓ 代码简单，SparkContext 直接写</text>
  <text x="90" y="365" font-size="11" fill="#7a5416">✗ 全量刷新时对 RegionServer 压力大</text>
  <text x="90" y="385" font-size="11" fill="#7a5416">✗ 触发大量 WAL 写入 + Compaction</text>
  <text x="90" y="405" font-size="11" fill="#7a5416">适合：增量小、数据量不大的表</text>

  <!-- 右：Bulk Load方式 -->
  <rect x="520" y="60" width="420" height="370" rx="10" fill="#fff" stroke="#2f9e6e" stroke-width="2"/>
  <text x="730" y="90" text-anchor="middle" font-size="14" font-weight="700" fill="#2f9e6e">方式二：Bulk Load（大厂全量刷新首选）</text>

  <rect x="550" y="110" width="360" height="40" rx="6" fill="#e8f8ef"/>
  <text x="730" y="135" text-anchor="middle" font-size="12">Spark 读 Hive T-1 表</text>
  <path d="M730,150 L730,175" stroke="#5b6472" stroke-width="2" marker-end="url(#a2)"/>

  <rect x="550" y="175" width="360" height="40" rx="6" fill="#e8f8ef"/>
  <text x="730" y="200" text-anchor="middle" font-size="12">直接生成 HFile 文件（绕过写路径）</text>
  <path d="M730,215 L730,240" stroke="#5b6472" stroke-width="2" marker-end="url(#a2)"/>

  <rect x="550" y="240" width="360" height="40" rx="6" fill="#e8f8ef"/>
  <text x="730" y="265" text-anchor="middle" font-size="12">LoadIncrementalHFiles 秒级挂载</text>

  <rect x="550" y="300" width="360" height="115" rx="6" fill="#f4fcf7" stroke="#a8dbc0"/>
  <text x="730" y="322" text-anchor="middle" font-size="12" font-weight="700" fill="#155d3a">特点</text>
  <text x="570" y="345" font-size="11" fill="#155d3a">✓ 不经过 RegionServer 写路径，压力极小</text>
  <text x="570" y="365" font-size="11" fill="#155d3a">✓ 千万/亿级全量刷新也能几分钟完成</text>
  <text x="570" y="385" font-size="11" fill="#155d3a">✓ 大厂做"T-1 全量刷新"的标准姿势</text>
  <text x="570" y="405" font-size="11" fill="#155d3a">适合：每天全量/大批量刷新场景</text>

  <text x="490" y="448" text-anchor="middle" font-size="12" fill="#5b6472">你这个场景是"每天全量刷新一份 T-1 快照" → 选 Bulk Load</text>
</svg>
