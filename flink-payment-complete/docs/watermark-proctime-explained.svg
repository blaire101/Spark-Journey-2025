<svg viewBox="0 0 1000 520" xmlns="http://www.w3.org/2000/svg" font-family="'Helvetica Neue', Arial, sans-serif">
  <defs>
    <marker id="wm1" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#5b6472"/>
    </marker>
  </defs>
  <rect width="1000" height="520" fill="#fafafa"/>
  <text x="500" y="32" text-anchor="middle" font-size="16" font-weight="700" fill="#1f2d3d">ProcTime vs EventTime + Watermark 到底是什么</text>

  <!-- 上半部分：两条时间线对比 -->
  <text x="60" y="70" font-size="13" font-weight="700" fill="#3b6ea5">① EventTime（事件时间）：数据自己带的业务时间戳</text>
  <line x1="60" y1="100" x2="920" y2="100" stroke="#c9d2dc" stroke-width="2"/>
  <circle cx="150" cy="100" r="5" fill="#3b6ea5"/>
  <text x="150" y="120" text-anchor="middle" font-size="10">09:00:00</text>
  <text x="150" y="135" text-anchor="middle" font-size="9" fill="#5b6472">支付真实发生时间</text>

  <circle cx="350" cy="100" r="5" fill="#3b6ea5"/>
  <text x="350" y="120" text-anchor="middle" font-size="10">09:00:03</text>
  <text x="350" y="135" text-anchor="middle" font-size="9" fill="#5b6472">另一笔支付</text>

  <!-- 网络延迟箭头，到达时间不同 -->
  <path d="M150,100 C 200,160 350,180 480,200" stroke="#c0392b" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#wm1)"/>
  <path d="M350,100 C 380,150 420,170 440,195" stroke="#c0392b" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#wm1)"/>
  <text x="300" y="165" font-size="10" fill="#c0392b">网络延迟/乱序，实际到达 Flink 的顺序可能颠倒</text>

  <text x="60" y="230" font-size="13" font-weight="700" fill="#2f9e6e">② ProcTime（处理时间）：Flink 处理这条数据那一刻，机器的墙上时钟</text>
  <line x1="60" y1="260" x2="920" y2="260" stroke="#c9d2dc" stroke-width="2"/>
  <circle cx="440" cy="260" r="5" fill="#2f9e6e"/>
  <text x="440" y="280" text-anchor="middle" font-size="10">10:15:22.103</text>
  <text x="440" y="295" text-anchor="middle" font-size="9" fill="#5b6472">Flink 真正算这条数据的系统时刻</text>
  <circle cx="480" cy="260" r="5" fill="#2f9e6e"/>
  <text x="480" y="280" text-anchor="middle" font-size="10">10:15:22.108</text>

  <rect x="60" y="320" width="880" height="70" rx="8" fill="#fff" stroke="#c9d2dc"/>
  <text x="80" y="345" font-size="12" font-weight="700" fill="#1f2d3d">关键区别</text>
  <text x="80" y="365" font-size="11" fill="#5b6472">EventTime 反映"业务上到底啥时候发生的"，可能乱序、可重放；ProcTime 只反映"Flink 现在算到这了"，不可重放，每次运行结果可能不同</text>
  <text x="80" y="382" font-size="11" fill="#5b6472">本方案里：pay_time 是 EventTime；proctime 是专门给 Lookup Join 用的系统时钟</text>

  <!-- Watermark 部分 -->
  <text x="60" y="425" font-size="13" font-weight="700" fill="#8e44ad">③ Watermark：给 EventTime 用的"我不再等更早数据了"的水位线</text>
  <line x1="60" y1="450" x2="920" y2="450" stroke="#c9d2dc" stroke-width="2"/>
  <circle cx="600" cy="450" r="5" fill="#3b6ea5"/>
  <text x="600" y="470" text-anchor="middle" font-size="10">当前最大 EventTime = 10:00:05</text>
  <line x1="595" y1="450" x2="450" y2="450" stroke="#8e44ad" stroke-width="3"/>
  <polygon points="450,450 460,444 460,456" fill="#8e44ad"/>
  <text x="500" y="490" text-anchor="middle" font-size="10" fill="#8e44ad">Watermark = 10:00:05 - 5秒 = 10:00:00</text>
  <text x="500" y="505" text-anchor="middle" font-size="10" fill="#8e44ad">意思：EventTime 早于10:00:00的数据，之后来了也不再等，直接算迟到</text>
</svg>
