<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GS Interview Prep — 4 Parts with English Read-Aloud</title>
<style>
  :root {
    --bg: #FAFAF9;
    --surface: #FFFFFF;
    --border: #E5E5E3;
    --border-strong: #D4D4D0;
    --text-primary: #1A1A18;
    --text-secondary: #57564F;
    --text-muted: #8A8985;
    --accent: #2971A8;
    --accent-bg: #E8F2FA;
    --success: #1E7A4C;
    --success-bg: #E4F5EC;
    --warning: #9A6B1E;
    --warning-bg: #FBF0DD;
    --danger: #B14A3F;
    --danger-bg: #FBECEA;
    --radius: 10px;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text-primary);
    line-height: 1.55;
  }
  .app { max-width: 920px; margin: 0 auto; padding: 24px 20px 80px; }
  header { margin-bottom: 20px; }
  header h1 { font-size: 22px; font-weight: 600; margin: 0 0 4px; }
  header p { font-size: 14px; color: var(--text-secondary); margin: 0; }

  .voice-bar {
    display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 10px 14px; margin-bottom: 18px;
    font-size: 13px; color: var(--text-secondary);
  }
  .voice-bar select { font-size: 13px; padding: 4px 8px; border-radius: 6px; border: 1px solid var(--border-strong); background: var(--surface); }
  .voice-bar label { display:flex; align-items:center; gap:6px; }
  .voice-bar input[type=range] { width: 100px; }

  .tabs {
    display: flex; gap: 6px; margin-bottom: 20px; border-bottom: 1px solid var(--border);
    overflow-x: auto;
  }
  .tab-btn {
    padding: 10px 16px; font-size: 14px; font-weight: 500; color: var(--text-secondary);
    background: none; border: none; border-bottom: 2px solid transparent; cursor: pointer;
    white-space: nowrap;
  }
  .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  .card {
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 16px 18px; margin-bottom: 14px;
  }
  .card-head { display:flex; justify-content:space-between; align-items:flex-start; gap: 10px; margin-bottom: 8px; }
  .card-title { font-size: 15.5px; font-weight: 600; margin: 0; }
  .tag { display:inline-block; font-size: 11px; padding: 2px 8px; border-radius: 999px; font-weight: 600; margin-top: 4px; }
  .tag.verified { background: var(--success-bg); color: var(--success); }
  .tag.general { background: var(--warning-bg); color: var(--warning); }
  .tag.speculative { background: var(--danger-bg); color: var(--danger); }

  .listen-btn {
    flex-shrink: 0; display:flex; align-items:center; gap:6px;
    font-size: 12.5px; font-weight: 500; padding: 6px 12px; border-radius: 999px;
    border: 1px solid var(--accent); background: var(--accent-bg); color: var(--accent); cursor: pointer;
    transition: background 0.15s;
  }
  .listen-btn:hover { background: #d7e9f7; }
  .listen-btn.speaking { background: var(--accent); color: white; }
  .listen-btn svg { width: 13px; height: 13px; }

  .card-body p { margin: 6px 0; font-size: 13.5px; color: var(--text-secondary); }
  .card-body .label { font-weight: 600; color: var(--text-primary); }
  .sample {
    background: #F4F4F2; border-radius: 8px; padding: 8px 12px; font-family: "SF Mono", Menlo, monospace;
    font-size: 12.5px; color: var(--text-primary); white-space: pre-wrap; margin: 8px 0;
  }
  .approach { font-size: 13.5px; color: var(--text-secondary); margin-top: 8px; }
  .approach ul { margin: 4px 0 0 18px; padding: 0; }
  .memory-tip {
    margin-top: 10px; font-size: 13px; padding: 8px 12px; border-radius: 8px;
    background: var(--success-bg); color: var(--success);
  }
  .source-note { font-size: 12px; color: var(--text-muted); margin-top: 8px; font-style: italic; }

  .phrase-row {
    display:flex; align-items:center; justify-content: space-between; gap: 10px;
    padding: 10px 0; border-bottom: 1px solid var(--border);
  }
  .phrase-row:last-child { border-bottom: none; }
  .phrase-text { font-size: 13.5px; color: var(--text-primary); flex: 1; }
  .concept-label { font-size: 12px; color: var(--text-muted); display:block; margin-bottom: 2px; }

  .section-title { font-size: 16px; font-weight: 600; margin: 26px 0 10px; }
  .section-title:first-child { margin-top: 0; }
  .intro-note {
    font-size: 13px; color: var(--text-secondary); background: var(--accent-bg);
    border-radius: var(--radius); padding: 12px 14px; margin-bottom: 18px;
  }
  .honest-note {
    font-size: 13px; color: var(--text-secondary); background: var(--warning-bg);
    border-radius: var(--radius); padding: 12px 14px; margin-top: 20px;
  }
</style>
</head>
<body>
<div class="app">
  <header>
    <h1>Goldman Sachs Interview Prep — 4 Parts</h1>
    <p>Data Engineering, Lakehouse &amp; AI Data Platform Engineer, VP — with English read-aloud practice</p>
  </header>

  <div class="voice-bar">
    <label>🔊 Voice:
      <select id="voiceSelect"></select>
    </label>
    <label>Speed:
      <input type="range" id="rateSlider" min="0.7" max="1.2" step="0.05" value="0.92">
    </label>
    <span id="rateLabel">0.92x</span>
    <button class="listen-btn" id="stopAllBtn" style="margin-left:auto">⏹ Stop</button>
  </div>

  <div class="tabs">
    <button class="tab-btn active" data-tab="cat">📚 Categories</button>
    <button class="tab-btn" data-tab="p1">Part 1</button>
    <button class="tab-btn" data-tab="p2">Part 2</button>
    <button class="tab-btn" data-tab="p3">Part 3 — Verified</button>
    <button class="tab-btn" data-tab="p4">Part 4 — Speculation &amp; English Practice</button>
  </div>

  <div id="cat" class="tab-panel active"></div>

  <div id="p1" class="tab-panel"></div>
  <div id="p2" class="tab-panel"></div>
  <div id="p3" class="tab-panel"></div>
  <div id="p4" class="tab-panel"></div>
</div>

<script>

const part1 = [
  {t:"1) LRU Cache — LeetCode 146", tag:"general", problem:"Design a data structure that supports get and put in O(1) time. When capacity is exceeded, evict the least recently used item.", sample:"put(1,1); put(2,2); get(1) -> 1; put(3,3) evicts key 2", approach:["HashMap for O(1) key lookup plus a Doubly Linked List for O(1) reordering","Most recently used moves to the front, least recently used sits at the tail"], tip:"HashMap answers WHERE is it. Linked List tracks HOW RECENTLY it was used."},
  {t:"2) SQL — Deduplicate & Get Latest Record", tag:"general", problem:"An ETL bug caused duplicate rows in a salary history table. Write a query that returns only the most recent salary per employee.", sample:"ROW_NUMBER() OVER (PARTITION BY employee_id ORDER BY updated_at DESC)", approach:["Use ROW_NUMBER partitioned by employee, ordered by latest date","Filter to row number equals one"], tip:"This exact pattern is explicitly named in Goldman Sachs's own published Data Engineer interview guide."},
  {t:"3) SQL — Second Highest Salary per Department", tag:"general", problem:"Find the second highest salary in each department.", sample:"DENSE_RANK() OVER (PARTITION BY department ORDER BY salary DESC)", approach:["Use DENSE_RANK so tied salaries share the same rank","Filter to rank equals two"], tip:"DENSE_RANK avoids gaps when there are ties. Use it for any Nth highest problem."},
  {t:"4) Binary Tree Level Order Traversal — LeetCode 102", tag:"general", problem:"Given a binary tree, return node values grouped level by level.", sample:"Input tree with root 3, children 9 and 20 -> Output [[3],[9,20],[15,7]]", approach:["Breadth first search with a queue","Process one full level at a time using the current queue length as the level size"], tip:"The queue length at the start of each loop equals the size of the current level."},
  {t:"5) Number of Islands — LeetCode 200", tag:"general", problem:"Given a 2D grid of land and water, count the number of islands.", sample:"11110 / 11010 / 11000 / 00000 -> 1 island", approach:["Depth first search flood fill: when you find land, sink the entire connected island","Count how many times a new depth first search is triggered"], tip:"DFS floods the whole island in one go, marking visited cells so you never recount."},
  {t:"6) Course Schedule — LeetCode 207", tag:"general", problem:"Given prerequisite pairs, determine if it is possible to finish all courses.", sample:"numCourses 2, prerequisites [[1,0],[0,1]] -> False (cycle)", approach:["Build a graph and use Kahn's algorithm topological sort","Courses with zero remaining prerequisites can be completed and removed layer by layer"], tip:"If you cannot process every node through topological sort, there is a cycle."},
  {t:"7) Rotting Oranges — LeetCode 994", tag:"general", problem:"Rotten oranges infect fresh neighbors every minute. Return minutes until all oranges rot, or minus one if impossible.", sample:"grid [[2,1,1],[1,1,0],[0,1,1]] -> 4 minutes", approach:["Multi source breadth first search: seed the queue with every rotten orange at once","Each full layer processed equals exactly one minute"], tip:"Multi source BFS means seeding ALL starting points into the queue together, not one at a time."},
  {t:"8) Word Break — LeetCode 139", tag:"general", problem:"Given a string and a word dictionary, determine if the string can be segmented into dictionary words.", sample:"s equals leetcode, wordDict equals leet and code -> True", approach:["dp of i means the first i characters can be segmented","For each position, check if any earlier position is solvable and the remaining piece is a dictionary word"], tip:"dp of i asks about the FIRST i characters, not the character at index i."},
  {t:"9) Group Anagrams — LeetCode 49", tag:"general", problem:"Given an array of strings, group anagrams together.", sample:"eat, tea, tan, ate, nat, bat -> grouped by sorted letters", approach:["Sort each word's letters to get a unique fingerprint","Group words sharing the same sorted key in a hashmap"], tip:"Anagrams always sort to the exact same string. Use that as the hashmap key."},
  {t:"10) Two Sum (plus streaming follow up)", tag:"general", problem:"Find two numbers in an array that add up to a target value.", sample:"nums 2,7,11,15 target 9 -> indices 0 and 1", approach:["Use a hashmap: for each number check if target minus number was seen before","Follow up: if data streams in one at a time, maintain a running count hashmap instead of sorting"], tip:"Streaming means you cannot sort or index by position. Maintain a running hashmap instead."},
];

const part2 = [
  {t:"11) Valid Parentheses — LeetCode 20", tag:"general", problem:"Given a string of brackets, determine if they are validly matched and nested.", sample:"s equals curly bracket square bracket round bracket round bracket square bracket curly bracket -> True", approach:["Use a stack: push opening brackets, pop and match on closing brackets","The stack must be completely empty at the end"], tip:"A stack is last opened, first closed — exactly how brackets nest."},
  {t:"12) Longest Substring Without Repeating Characters — LeetCode 3", tag:"general", problem:"Find the length of the longest substring without repeating characters.", sample:"s equals abcabcbb -> answer 3, the substring abc", approach:["Sliding window with two pointers, left and right","Use a set to track characters currently inside the window, shrink from the left on a duplicate"], tip:"The right pointer explores, the left pointer cleans up."},
  {t:"13) Merge Intervals — LeetCode 56", tag:"general", problem:"Given a list of intervals, merge all overlapping intervals.", sample:"[[1,3],[2,6],[8,10],[15,18]] -> [[1,6],[8,10],[15,18]]", approach:["Sort intervals by start time first","Walk through them, extending the last merged interval whenever there is overlap"], tip:"Sorting first turns any overlap check into comparing only against the previous interval."},
  {t:"14) Kth Largest Element in an Array — LeetCode 215", tag:"general", problem:"Find the kth largest element in an unsorted array.", sample:"nums 3,2,1,5,6,4 k equals 2 -> answer 5", approach:["Maintain a min heap of size k","The top of the heap at the end is exactly the kth largest"], tip:"A min heap of size k always keeps the k largest values seen so far."},
  {t:"15) Top K Frequent Elements — LeetCode 347", tag:"general", problem:"Given an array, return the k most frequent elements.", sample:"nums 1,1,1,2,2,3 k equals 2 -> answer 1 and 2", approach:["Count frequency with a hashmap first","Then use a heap to extract the top k by frequency"], tip:"Count first with a hashmap, then rank with a heap — this two step combo shows up constantly."},
  {t:"16) Trapping Rain Water — LeetCode 42", tag:"verified", problem:"Given an elevation map, compute how much rainwater it can trap after raining.", sample:"height 0,1,0,2,1,0,1,3,2,1,2,1 -> answer 6", approach:["Water trapped at a position equals the shorter of the two tallest walls on either side, minus the current height","Precompute the tallest wall to the left and to the right of every position"], tip:"This is one of the most frequently reported Goldman Sachs interview questions across multiple independent sources."},
  {t:"17) Design Hit Counter — LeetCode 362", tag:"general", problem:"Design a hit counter that counts hits received in the past three hundred seconds.", sample:"hit at 1,2,3 then getHits at 4 returns 3", approach:["Use a queue to store timestamps of hits","On a query, pop all timestamps older than the window before counting"], tip:"This is a sliding window over TIME instead of over an array."},
  {t:"18) SQL — Running Total (Cumulative Sum)", tag:"general", problem:"Given daily transaction amounts, compute a running cumulative total ordered by date.", sample:"SUM(amount) OVER (ORDER BY date)", approach:["A window function with ORDER BY but no PARTITION BY treats the whole table as one running window"], tip:"This is the standard pattern for any cumulative metric."},
  {t:"19) SQL — Find Duplicate Emails", tag:"general", problem:"Find all emails that appear more than once in a table.", sample:"GROUP BY email HAVING COUNT(*) greater than 1", approach:["GROUP BY collapses rows with the same email together","HAVING filters groups AFTER aggregation, which WHERE cannot do"], tip:"WHERE filters rows before grouping. HAVING filters groups after aggregation."},
  {t:"20) Merge Two Sorted Lists — LeetCode 21", tag:"general", problem:"Merge two sorted linked lists into one sorted linked list.", sample:"l1 equals 1,2,4 and l2 equals 1,3,4 -> merged 1,1,2,3,4,4", approach:["Use a dummy head node to simplify edge cases","Compare the current nodes of both lists, attach the smaller one, advance that pointer"], tip:"The dummy head trick avoids special casing an empty result at the very start."},
];

const part3 = [
  {t:"21) String Compression", src:"Medium — My Interview Experience at Goldman Sachs", problem:"Compress a string by replacing consecutive repeated characters with the character followed by its count.", sample:"aaabbcbbb -> a3b2c1b3", approach:["Walk through the string counting consecutive repeats","When the character changes, append character plus count to the result"], tip:"Loop one past the end of the string so the very last group still gets flushed into the result."},
  {t:"22) Trapping Rain Water", src:"Multiple independent GS interview reports, including a rephrased version called Snowpack", problem:"Given an elevation map, compute how much rainwater it can trap.", sample:"height 0,1,0,2,1,0,1,3,2,1,2,1 -> answer 6", approach:["Precompute the tallest wall to the left and right of every position","Water at each position equals the shorter wall minus the height there"], tip:"Reported as one of the MOST frequently mentioned Goldman Sachs CoderPad questions."},
  {t:"23) Two Sum", src:"LeetCode Discuss, Data Engineer round; Medium interview report", problem:"Find two numbers in an array that add up to a target value.", sample:"nums 2,7,11,15 target 9 -> indices 0 and 1", approach:["Use a hashmap and check for the complement as you go"], tip:"Reported as a common OPENER question before a harder second question follows."},
  {t:"24) Most Frequent IP Address from Logs", src:"LeetCode Discuss — Software Engineer Associate round", problem:"Given a list of log entries, find the IP address that appears most frequently.", sample:"logs with repeated IPs -> the one with the highest count", approach:["Count occurrences with a hashmap","Track the running maximum while iterating, no second pass needed"], tip:"Interviewer explicitly said no heap needed here, just plain counting."},
  {t:"25) Union-Find — Largest Tree Root in a Forest", src:"LeetCode Discuss — Software Engineer Associate, round two", problem:"Given a child to parent hashmap representing a forest, find the root of the tree with the most nodes.", sample:"child to parent mapping -> root with the most descendants, smallest root wins ties", approach:["Follow the child to parent chain up to the root for every node","Count how many nodes map to each root"], tip:"This is a lightweight version of Union-Find since the structure is already fully given."},
  {t:"26) Student with Highest Average Score", src:"LeetCode Discuss — Data Engineer round, July 2020", problem:"Given name and score pairs, find the student with the highest average score, floored to the nearest integer.", sample:"Bob, Mike, Jason, Jessica scores -> Jessica has the highest single score average", approach:["Group scores by student name","Compute the floored average per student, then take the maximum"], tip:"This is essentially a GROUP BY and AVERAGE operation done in plain Python instead of SQL."},
  {t:"27) Robot Final Coordinates from a Move String", src:"Same July 2020 Data Engineer report, second question", problem:"Given a string of up, down, left, right moves, compute the final coordinates starting from the origin.", sample:"moves U U U D U L R -> final position", approach:["Map each direction letter to a coordinate delta","Walk through the string applying each delta to a running position"], tip:"Interviewer asked the candidate to add extra test cases afterward — propose edge cases yourself."},
  {t:"28) Design a Calculator", src:"Glassdoor — Goldman Sachs Superday, June 2026, Dallas", problem:"Design a basic calculator evaluating an expression with plus, minus, multiply, and divide, respecting precedence.", sample:"3 plus 2 times 2 -> answer 7", approach:["Use a stack to handle operator precedence","For multiply and divide, pop and apply immediately; for plus and minus, push the signed value"], tip:"Interviewer explicitly asked candidates to check all edge cases and discuss time and space complexity."},
];

// ---------- Rendering ----------

function tagLabel(tag) {
  if (tag === "verified") return '<span class="tag verified">Confirmed pattern</span>';
  if (tag === "general") return '<span class="tag general">General pattern — not GS-confirmed</span>';
  return '<span class="tag speculative">Speculative</span>';
}

function renderQuestionCard(q, idx, prefix) {
  const speakId = `${prefix}-${idx}`;
  const fullText = `${q.t}. ${q.problem} ${q.approach.join('. ')}. ${q.tip}`;
  return `
    <div class="card" id="card-${speakId}">
      <div class="card-head">
        <div>
          <p class="card-title">${q.t}</p>
          ${q.tag ? tagLabel(q.tag) : ''}
          ${q.src ? `<div class="source-note">Source: ${q.src}</div>` : ''}
        </div>
        <button class="listen-btn" data-text="${encodeURIComponent(fullText)}" onclick="toggleSpeak(this)">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1-3.29-2.5-4.03v8.05c1.5-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
          Listen
        </button>
      </div>
      <div class="card-body">
        <p><span class="label">Problem:</span> ${q.problem}</p>
        <div class="sample">${q.sample}</div>
        <div class="approach">
          <span class="label">Approach:</span>
          <ul>${q.approach.map(a => `<li>${a}</li>`).join('')}</ul>
        </div>
        <div class="memory-tip">💡 ${q.tip}</div>
      </div>
    </div>
  `;
}

function renderSummaryTable(rows, caption) {
  return `
    <div class="card" style="overflow-x:auto;">
      <p style="font-weight:600; font-size:14px; margin:0 0 10px;">${caption}</p>
      <table style="width:100%; border-collapse:collapse; font-size:12.5px;">
        <thead>
          <tr style="border-bottom:1.5px solid var(--border-strong); text-align:left;">
            <th style="padding:6px 8px; color:var(--text-muted); font-weight:600;">#</th>
            <th style="padding:6px 8px; color:var(--text-muted); font-weight:600;">Question</th>
            <th style="padding:6px 8px; color:var(--text-muted); font-weight:600;">Technique</th>
            <th style="padding:6px 8px; color:var(--text-muted); font-weight:600;">Gist</th>
          </tr>
        </thead>
        <tbody>
          ${rows.map(r => `
            <tr style="border-bottom:1px solid var(--border);">
              <td style="padding:6px 8px; color:var(--text-muted);">${r[0]}</td>

function switchTab(tabId) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelector(`.tab-btn[data-tab="${tabId}"]`).classList.add('active');
  document.getElementById(tabId).classList.add('active');
}

function jumpTo(tabId, cardId) {
  switchTab(tabId);
  requestAnimationFrame(() => {
    setTimeout(() => {
      const card = document.getElementById(cardId);
      if (!card) {
        console.warn('jumpTo: could not find element with id', cardId);
        return;
      }
      card.scrollIntoView({ behavior: 'smooth', block: 'center' });
      card.style.transition = 'background 0.3s';
      card.style.background = 'var(--accent-bg)';
      setTimeout(() => { card.style.background = ''; }, 1500);
    }, 60);
  });
}

// ---------- Text-to-Speech ----------
let voices = [];
let currentUtterance = null;
let currentBtn = null;
const speechSupported = typeof window !== 'undefined' && 'speechSynthesis' in window;

function loadVoices() {
  if (!speechSupported) return;
  try {
    voices = window.speechSynthesis.getVoices().filter(v => v.lang.startsWith('en'));
    const select = document.getElementById('voiceSelect');
    if (!select) return;
    select.innerHTML = '';
    if (voices.length === 0) {
      select.innerHTML = '<option>Default English voice</option>';
      return;
    }
    voices.forEach((v, i) => {
      const opt = document.createElement('option');
      opt.value = i;
      opt.textContent = `${v.name} (${v.lang})`;
      if (v.name.includes('Natural') || v.name.includes('Samantha') || v.name.includes('Google US English')) {
        opt.selected = true;
      }
      select.appendChild(opt);
    });
  } catch (e) {
    console.warn('Voice loading failed (non-critical):', e);
  }
}

try {
  if (speechSupported) {
    window.speechSynthesis.onvoiceschanged = loadVoices;
    loadVoices();
  } else {
    const vsel = document.getElementById('voiceSelect');
    if (vsel) vsel.innerHTML = '<option>Speech not supported in this browser</option>';
  }
} catch (e) {
  console.warn('Speech synthesis init failed (non-critical):', e);
}

const rateSlider = document.getElementById('rateSlider');
const rateLabel = document.getElementById('rateLabel');
if (rateSlider) {
  rateSlider.addEventListener('input', () => {
    rateLabel.textContent = rateSlider.value + 'x';
  });
}

function toggleSpeak(btn) {
  if (!speechSupported) {
    alert('Text-to-speech is not supported in this browser.');
    return;
  }
  try {
    const text = decodeURIComponent(btn.dataset.text);

    if (btn.classList.contains('speaking')) {
      window.speechSynthesis.cancel();
      btn.classList.remove('speaking');
      currentBtn = null;
      return;
    }

    window.speechSynthesis.cancel();
    if (currentBtn) {
      currentBtn.classList.remove('speaking');
    }

    const utter = new SpeechSynthesisUtterance(text);
    const voiceIdx = document.getElementById('voiceSelect').value;
    if (voices[voiceIdx]) utter.voice = voices[voiceIdx];
    utter.lang = 'en-US';
    utter.rate = parseFloat(rateSlider.value);
    utter.pitch = 1.0;

    utter.onstart = () => {
      btn.classList.add('speaking');
      currentBtn = btn;
      currentUtterance = utter;
    };
    utter.onend = () => {
      btn.classList.remove('speaking');
      currentBtn = null;
    };
    utter.onerror = () => {
      btn.classList.remove('speaking');
      currentBtn = null;
    };

    window.speechSynthesis.speak(utter);
  } catch (e) {
    console.warn('toggleSpeak failed:', e);
  }
}

const stopAllBtn = document.getElementById('stopAllBtn');
if (stopAllBtn) {
  stopAllBtn.addEventListener('click', () => {
    if (speechSupported) window.speechSynthesis.cancel();
    document.querySelectorAll('.listen-btn.speaking').forEach(b => b.classList.remove('speaking'));
    currentBtn = null;
  });
}
