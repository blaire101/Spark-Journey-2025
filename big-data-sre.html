<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Big Data Platform Ops — Interview Prep</title>
<style>
  :root {
    --bg:#FAFAF9; --surface:#FFFFFF; --border:#E5E5E3; --border-strong:#D4D4D0;
    --text-primary:#1A1A18; --text-secondary:#57564F; --text-muted:#8A8985;
    --accent:#2971A8; --accent-bg:#E8F2FA;
    --success:#1E7A4C; --success-bg:#E4F5EC;
    --warning:#9A6B1E; --warning-bg:#FBF0DD;
    --danger:#B14A3F; --danger-bg:#FBECEA;
    --purple:#7B4FA0; --purple-bg:#F1E9F7;
    --radius:10px;
  }
  * { box-sizing:border-box; }
  body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif; background:var(--bg); color:var(--text-primary); line-height:1.55; }
  .app { max-width:980px; margin:0 auto; padding:24px 20px 80px; }
  header h1 { font-size:21px; font-weight:600; margin:0 0 4px; }
  header p { font-size:13.5px; color:var(--text-secondary); margin:0 0 16px; }

  .voice-bar { display:flex; align-items:center; gap:10px; flex-wrap:wrap; background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:10px 14px; margin-bottom:18px; font-size:13px; color:var(--text-secondary); }
  .voice-bar select { font-size:13px; padding:4px 8px; border-radius:6px; border:1px solid var(--border-strong); }
  .voice-bar input[type=range] { width:100px; }

  .tabs { display:flex; gap:4px; margin-bottom:18px; border-bottom:1px solid var(--border); overflow-x:auto; }
  .tab-btn { padding:9px 13px; font-size:12.5px; font-weight:600; color:var(--text-secondary); background:none; border:none; border-bottom:3px solid transparent; cursor:pointer; white-space:nowrap; }
  .tab-btn.active { color:var(--accent); border-bottom-color:var(--accent); }
  .tab-panel { display:none; }
  .tab-panel.active { display:block; }

  .level-header { display:flex; align-items:flex-start; gap:12px; margin:24px 0 12px; padding-bottom:8px; border-bottom:2px solid var(--border-strong); }
  .level-header:first-of-type { margin-top:4px; }
  .level-emoji { font-size:20px; line-height:1.3; }
  .level-label { font-size:14.5px; font-weight:700; color:var(--text-primary); }
  .level-desc { font-size:12px; color:var(--text-secondary); margin-top:2px; }

  .card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:16px 18px; margin-bottom:14px; }

  .star-banner { display:flex; align-items:center; gap:10px; font-size:13px; font-weight:700; padding:9px 14px; border-radius:var(--radius); margin:18px 0 10px; }
  .star-banner.S { background:var(--danger-bg); color:var(--danger); }
  .star-banner.T { background:var(--warning-bg); color:var(--warning); }
  .star-banner.A { background:var(--purple-bg); color:var(--purple); }

  .kw-badge { display:inline-block; font-size:11.5px; font-weight:600; padding:1px 8px; border-radius:999px; background:var(--accent-bg); color:var(--accent); font-family:"SF Mono",Menlo,monospace; }

  .steps-list { margin:14px 0; }
  .step-item { display:flex; gap:12px; margin-bottom:14px; align-items:flex-start; }
  .step-item:last-child { margin-bottom:0; }
  .step-num { flex-shrink:0; width:26px; height:26px; border-radius:50%; background:var(--accent); color:white; font-size:13px; font-weight:700; display:flex; align-items:center; justify-content:center; }
  .step-item div:last-child { font-size:13px; line-height:1.6; color:var(--text-primary); }
  .step-item code { background:#F4F4F2; padding:1px 5px; border-radius:4px; font-family:"SF Mono",Menlo,monospace; font-size:11.5px; }
  .where-label { font-weight:700; color:var(--accent); }
  .toc-btn { font-size:12px; font-weight:600; padding:7px 14px; border-radius:999px; border:1.3px solid; cursor:pointer; background:var(--surface); transition:transform 0.1s; }
  .toc-btn:hover { transform:translateY(-1px); }
  .toc-btn-s { border-color:var(--danger); color:var(--danger); }
  .toc-btn-t { border-color:var(--warning); color:var(--warning); }
  .toc-btn-a { border-color:var(--purple); color:var(--purple); }
  .zh-desc { color:var(--text-secondary); font-size:12.5px; background:#F7F7F5; border-radius:6px; padding:6px 10px; margin-top:4px !important; }
  .cell-zh { color:var(--text-muted); font-size:10.5px; }

  /* --- Imported from sla_prep_star.html --- */
  .flow { font-family:"SF Mono",Menlo,monospace; font-size:12px; background:var(--accent-bg); color:var(--accent); border-radius:8px; padding:8px 12px; margin:8px 0; }
  .metric-row { display:flex; gap:10px; flex-wrap:wrap; margin:10px 0; }
  .metric { flex:1; min-width:110px; background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:10px; text-align:center; }
  .metric .label { font-size:11px; color:var(--text-muted); }
  .metric .before { font-size:13.5px; color:var(--danger); font-weight:600; }
  .metric .after { font-size:13.5px; color:var(--success); font-weight:600; }
  .quote-card { background:var(--surface); border:1px solid var(--border-strong); border-radius:var(--radius); padding:16px 18px; margin-bottom:14px; }
  .quote-text { font-size:13.5px; color:var(--text-primary); font-style:italic; line-height:1.7; }

  /* --- Imported from sql_prep.html --- */
  .diagram-details { margin:10px 0 0; }
  .diagram-details summary {
    cursor:pointer; font-size:12.5px; font-weight:600; color:var(--accent);
    padding:6px 10px; background:var(--accent-bg); border-radius:8px; list-style:none;
    display:inline-block; user-select:none;
  }
  .diagram-details summary::-webkit-details-marker { display:none; }
  .diagram-details[open] summary { margin-bottom:6px; }
  table.datatbl td.hl { background:var(--success-bg); color:var(--success); font-weight:600; }

  .q-head { display:flex; justify-content:space-between; align-items:flex-start; gap:10px; margin-bottom:6px; }
  .q-title { font-size:14.5px; font-weight:600; margin:0; }
  .q-desc { font-size:13px; color:var(--text-secondary); margin:4px 0 8px; }

  table.datatbl { border-collapse:collapse; font-size:12px; margin:8px 0; width:100%; overflow-x:auto; display:block; }
  table.datatbl th, table.datatbl td { border:1px solid var(--border); padding:5px 9px; text-align:left; vertical-align:top; }
  table.datatbl th { background:var(--accent-bg); color:var(--accent); font-weight:600; }

  .codeblock { background:#F4F4F2; border-radius:8px; padding:10px 14px; font-family:"SF Mono",Menlo,monospace; font-size:11.5px; color:var(--text-primary); white-space:pre; overflow-x:auto; margin:8px 0; line-height:1.55; }
  .kw { color:#AF3A83; font-weight:600; }
  .fn { color:#2971A8; font-weight:600; }
  .str { color:#1E7A4C; }
  .num { color:#B5651D; }
  .cmt { color:#8A8985; font-style:italic; }

  .tip { font-size:12px; color:var(--success); background:var(--success-bg); border-radius:6px; padding:6px 10px; margin-top:8px; }
  .warn { font-size:12px; color:var(--warning); background:var(--warning-bg); border-radius:6px; padding:6px 10px; margin-top:8px; }
  .step-label { font-size:12px; font-weight:700; color:var(--accent); margin:10px 0 2px; display:block; }
  .intro-note { font-size:13px; color:var(--text-secondary); background:var(--accent-bg); border-radius:var(--radius); padding:10px 14px; margin-bottom:16px; }

  .listen-btn { flex-shrink:0; display:flex; align-items:center; gap:6px; font-size:12px; font-weight:500; padding:5px 10px; border-radius:999px; border:1px solid var(--accent); background:var(--accent-bg); color:var(--accent); cursor:pointer; }
  .listen-btn.speaking { background:var(--accent); color:white; }
  .listen-btn svg { width:12px; height:12px; }


  /* --- Flink detailed learning cards --- */
  .flink-inline-svg { width:100%; height:auto; display:block; }
  .flink-map { display:grid; grid-template-columns:repeat(auto-fit,minmax(190px,1fr)); gap:10px; margin:10px 0; }
  .flink-map-item { border:1px solid var(--border); border-radius:9px; padding:10px 12px; background:#FBFBFA; }
  .flink-map-item strong { display:block; font-size:12.5px; margin-bottom:3px; }
  .flink-map-item span { display:block; color:var(--text-secondary); font-size:11.5px; line-height:1.5; }
  .case-label { display:inline-block; padding:3px 9px; border-radius:999px; font-size:11px; font-weight:700; margin:4px 0 8px; }
  .case-label.blue { color:var(--accent); background:var(--accent-bg); }
  .case-label.green { color:var(--success); background:var(--success-bg); }
  .example-box { background:#F7F7F5; border-left:3px solid var(--accent); border-radius:0 8px 8px 0; padding:10px 12px; margin:9px 0; font-size:12.5px; }
  .answer-box { background:var(--purple-bg); color:#4E2D68; border-radius:8px; padding:10px 12px; margin-top:10px; font-size:12.5px; line-height:1.65; }
  .answer-box strong { display:block; font-size:11.5px; text-transform:uppercase; letter-spacing:.04em; margin-bottom:3px; }
  .flow-steps { display:flex; align-items:center; gap:6px; flex-wrap:wrap; margin:9px 0; }
  .flow-node { padding:5px 9px; border:1px solid var(--border-strong); border-radius:7px; background:var(--surface); font-size:11.5px; font-weight:600; }
  .flow-arrow { color:var(--text-muted); font-weight:700; }
  .tiny-note { color:var(--text-muted); font-size:11px; margin-top:5px; }
  @media (max-width:620px) { .flink-map { grid-template-columns:1fr; } }

</style>
<body>
<div class="app">
  <header>
    <h1>Big Data Platform Ops — Interview Prep</h1>
    <p>HDFS &middot; YARN &middot; Spark memory internals &middot; Kafka &amp; ClickHouse &middot; Docker &amp; K8S &middot; Linux &mdash; from fundamentals to diagnosis, with diagrams</p>
  </header>

  <div class="voice-bar">
    <label>🔊 Voice: <select id="voiceSelect"></select></label>
    <label>Speed: <input type="range" id="rateSlider" min="0.7" max="1.2" step="0.05" value="0.92"></label>
    <span id="rateLabel">0.92x</span>
    <button class="listen-btn" id="stopAllBtn" style="margin-left:auto">⏹ Stop</button>
  </div>

  <div class="tabs">
    <button class="tab-btn active" data-tab="hdfs">🧶🗄️🐝 YARN &amp; HDFS &amp; Hive</button>
    <button class="tab-btn" data-tab="spark">⚡ Spark Memory</button>
    <button class="tab-btn" data-tab="clickhouse">📨 MQ &amp; ClickHouse</button>
    <button class="tab-btn" data-tab="k8s">🐳 Docker &amp; K8S</button>
    <button class="tab-btn" data-tab="linux">🐧 Linux</button>
    <button class="tab-btn" data-tab="ref">📋 Quick Reference</button>
  </div>

  <div id="hdfs" class="tab-panel active"></div>
  <div id="spark" class="tab-panel"></div>
  <div id="clickhouse" class="tab-panel"></div>
  <div id="k8s" class="tab-panel"></div>
  <div id="linux" class="tab-panel"></div>
  <div id="ref" class="tab-panel"></div>
</div>

<script>
const speakIcon = `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1-3.29-2.5-4.03v8.05c1.5-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>`;
function listenBtn(text) { return `<button class="listen-btn" data-action="speak" data-text="${encodeURIComponent(text)}">${speakIcon}Listen</button>`; }
function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function table(headers, rows) {
  function renderCell(c) {
    if (typeof c === 'string' && c.includes('||')) {
      const [en, zh] = c.split('||');
      return `${en}<br><span class="cell-zh"> ${zh}</span>`;
    }
    return c;
  }
  let html = '<table class="datatbl"><thead><tr>' + headers.map(h=>`<th>${h}</th>`).join('') + '</tr></thead><tbody>';
  rows.forEach(r => { html += '<tr>' + r.map(c=>`<td>${renderCell(c)}</td>`).join('') + '</tr>'; });
  html += '</tbody></table>';
  return html;
}
const KW = new Set(['SET','SELECT','FROM','WHERE','if','else','for','while','def','class','return','import','from','as','true','false','TRUE','FALSE','CREATE','TABLE','INSERT','INTO','WITH','CONNECTOR','PRIMARY','KEY','NOT','ENFORCED','WATERMARK','FOR','AS','INTERVAL','TIMESTAMP','STRING','DECIMAL','BIGINT','LEFT','JOIN','SYSTEM_TIME','OF','ON','IS','NULL','ROW_NUMBER','OVER','PARTITION','BY','ORDER','DATE_FORMAT','COUNT','SUM','GROUP','TUMBLE','DESCRIPTOR','AND','OR','CASE','WHEN','THEN','END','CAST','PROCTIME','CURRENT_TIMESTAMP']);
const FN = new Set(['spark-submit','yarn','hdfs','jstack','jmap','top','htop']);
function highlightCode(code) {
  const tokenRe = /((?:#|--)[^\n]*)|('[^'\n]*'|"[^"\n]*")|(\b\d+(?:\.\d+)?\b)|([A-Za-z_][A-Za-z0-9_.-]*)|([\s\S])/g;
  let out = ''; let m;
  while ((m = tokenRe.exec(code)) !== null) {
    const [, comment, str, num, word, other] = m;
    if (comment) out += `<span class="cmt">${esc(comment)}</span>`;
    else if (str) out += `<span class="str">${esc(str)}</span>`;
    else if (num) out += `<span class="num">${esc(num)}</span>`;
    else if (word) {
      if (FN.has(word)) out += `<span class="fn">${esc(word)}</span>`;
      else if (KW.has(word)) out += `<span class="kw">${esc(word)}</span>`;
      else out += esc(word);
    } else out += esc(other);
  }
  return out;
}

function renderCard(item) {
  const speakText = item.speak || `${item.title}. ${item.desc || ''}`;
  let html = `<div class="card">
    <div class="q-head">
      <p class="q-title">${item.title}</p>
      ${listenBtn(speakText)}
    </div>`;
  if (item.desc) html += `<p class="q-desc">${item.desc}</p>`;
  if (item.zh) html += `<p class="q-desc zh-desc"> ${item.zh}</p>`;
  if (item.html) html += item.html;
  if (item.diagram) html += `<div style="margin:10px 0;">${item.diagram}</div>`;
  if (item.table) html += item.table;
  if (item.code) html += `<div class="codeblock">${highlightCode(item.code)}</div>`;
  if (item.collapsibleCode) html += `<details class="diagram-details"><summary>${item.collapsibleLabel || '▶ 展开查看文件'}</summary><div class="codeblock">${highlightCode(item.collapsibleCode)}</div></details>`;
  if (item.collapsibleHtml) html += `<details class="diagram-details"><summary>${item.collapsibleLabel || '▶ 展开查看详情'}</summary>${item.collapsibleHtml}</details>`;
  if (item.tip) html += `<div class="tip">💡 ${item.tip}</div>`;
  if (item.tipZh) html += `<div class="tip zh-desc">💡 ${item.tipZh}</div>`;
  if (item.warn) html += `<div class="warn">⚠️ ${item.warn}</div>`;
  if (item.warnZh) html += `<div class="warn zh-desc">⚠️ ${item.warnZh}</div>`;
  html += `</div>`;
  return html;
}

function renderByLevel(containerId, data, levelMetaMap, append) {
  const el = document.getElementById(containerId);
  let html = '';
  let currentLevel = null;
  data.forEach(item => {
    if (item.level !== currentLevel) {
      currentLevel = item.level;
      const meta = levelMetaMap[currentLevel];
      html += `<div class="level-header"><span class="level-emoji">${meta.emoji}</span><div><div class="level-label">${meta.label}</div><div class="level-desc">${meta.desc}</div></div></div>`;
    }
    html += renderCard(item);
  });
  if (append) el.innerHTML += html; else el.innerHTML = html;
}

// ============================================================
// DATA
// ============================================================

const hdfsLevelMeta = {
  basics: {emoji:"🌱", label:"Level 1 — Fundamentals", desc:"What HDFS is, and its two core node types."},
  internals: {emoji:"⚙️", label:"Level 2 — How reads/writes actually work", desc:"The mechanics interviewers actually probe."},
  ha: {emoji:"🛡️", label:"Level 3 — High Availability & failure modes", desc:"What happens when things break, and how HDFS survives it."},
};

const hdfsData = [
  {level:"basics", title:"What is HDFS, and why does it exist?", desc:"HDFS (Hadoop Distributed File System) stores huge files by splitting them into fixed-size blocks and spreading those blocks across many cheap machines, with replication for fault tolerance.",
   zh:"中文：HDFS把超大文件切成固定大小的block，分散存到很多台便宜的机器上，并且做多副本(replication)保证容错。",
   speak:"HDFS stores huge files by splitting them into fixed-size blocks and spreading those blocks across many cheap machines, with replication for fault tolerance.",
   table: table(["Property","Typical default"], [
     ["Block size","128 MB (was 64MB in older Hadoop 1.x)||128MB(旧版Hadoop 1.x是64MB)"],
     ["Replication factor","3 copies of every block||每个block默认3份副本"],
     ["Design goal","High throughput for large files, NOT low-latency small reads||为大文件高吞吐设计，不是为低延迟小读设计"],
   ]),
   tip:"HDFS is optimized for 'write once, read many times' — it's bad at handling millions of tiny files (the 'small file problem')."},

  {level:"basics", title:"NameNode vs DataNode — the two core roles", desc:"NameNode is the 'librarian' who knows WHERE every book is. DataNodes are the actual 'shelves' holding the books.",
   zh:"中文：NameNode是「图书管理员」，只知道每本书放在哪；DataNode才是真正放书的「书架」，存实际数据。",
   speak:"NameNode is the librarian who knows where every book is. DataNodes are the actual shelves holding the books.",
   diagram: `<svg width="100%" viewBox="0 0 680 260" style="max-width:600px; display:block; margin:8px auto;">
<defs><marker id="hd1" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 Z" fill="#888"/></marker></defs>
<rect x="250" y="15" width="180" height="55" rx="8" fill="var(--accent-bg)" stroke="var(--accent)" stroke-width="1.5"/>
<text x="340" y="37" text-anchor="middle" font-size="13" font-weight="700" fill="var(--accent)" font-family="-apple-system,sans-serif">NameNode</text>
<text x="340" y="55" text-anchor="middle" font-size="10.5" fill="var(--accent)" font-family="-apple-system,sans-serif">Metadata only: filenames,</text>
<text x="340" y="68" text-anchor="middle" font-size="10.5" fill="var(--accent)" font-family="-apple-system,sans-serif">block locations, permissions</text>

<line x1="340" y1="70" x2="120" y2="130" stroke="#888" stroke-width="1.2" marker-end="url(#hd1)"/>
<line x1="340" y1="70" x2="340" y2="130" stroke="#888" stroke-width="1.2" marker-end="url(#hd1)"/>
<line x1="340" y1="70" x2="560" y2="130" stroke="#888" stroke-width="1.2" marker-end="url(#hd1)"/>

<rect x="40" y="130" width="160" height="70" rx="8" fill="var(--success-bg)" stroke="var(--success)"/>
<text x="120" y="150" text-anchor="middle" font-size="12" font-weight="700" fill="var(--success)" font-family="-apple-system,sans-serif">DataNode 1</text>
<text x="120" y="168" text-anchor="middle" font-size="10" fill="var(--success)" font-family="-apple-system,sans-serif">Block A, Block C</text>
<text x="120" y="184" text-anchor="middle" font-size="10" fill="var(--success)" font-family="-apple-system,sans-serif">(actual data)</text>

<rect x="260" y="130" width="160" height="70" rx="8" fill="var(--success-bg)" stroke="var(--success)"/>

<text x="340" y="168" text-anchor="middle" font-size="10" fill="var(--success)" font-family="-apple-system,sans-serif">Block B, Block A</text>
<text x="340" y="184" text-anchor="middle" font-size="10" fill="var(--success)" font-family="-apple-system,sans-serif">(actual data)</text>

<rect x="480" y="130" width="160" height="70" rx="8" fill="var(--success-bg)" stroke="var(--success)"/>
<text x="560" y="150" text-anchor="middle" font-size="12" font-weight="700" fill="var(--success)" font-family="-apple-system,sans-serif">DataNode 3</text>
<text x="560" y="168" text-anchor="middle" font-size="10" fill="var(--success)" font-family="-apple-system,sans-serif">Block C, Block B</text>
<text x="560" y="184" text-anchor="middle" font-size="10" fill="var(--success)" font-family="-apple-system,sans-serif">(actual data)</text>

<text x="340" y="225" text-anchor="middle" font-size="11" fill="var(--text-secondary)" font-family="-apple-system,sans-serif">Each block replicated 3x across DIFFERENT DataNodes</text>
<text x="340" y="243" text-anchor="middle" font-size="11" font-weight="700" fill="var(--warning)" font-family="-apple-system,sans-serif">DataNodes also send periodic Heartbeats + Block Reports to NameNode</text>
</svg>`,
   tip:"If NameNode dies with no backup, the CLUSTER IS BLIND — it still has all the data blocks, but has no idea what file they belong to. This is why NameNode HA exists (see Level 3)."},

  {level:"internals", title:"Write path — what happens when a client writes a file", desc:"The client never sends data through the NameNode — only metadata requests go there. Actual bytes flow directly to DataNodes.",
   zh:"中文：客户端写数据时，数据本身不经过NameNode——只有「元数据请求」(问block该写哪)会经过它，真正的字节流直接发给DataNode。",
   speak:"The client never sends data through the NameNode, only metadata requests go there. Actual bytes flow directly to DataNodes in a pipeline.",
   diagram: `<svg width="100%" viewBox="0 0 680 240" style="max-width:600px; display:block; margin:8px auto;">
<defs><marker id="hd2" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 Z" fill="#888"/></marker></defs>

function switchTab(tabId) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelector(`.tab-btn[data-tab="${tabId}"]`).classList.add('active');
  document.getElementById(tabId).classList.add('active');
}
document.querySelectorAll('.tab-btn').forEach(btn => btn.addEventListener('click', () => switchTab(btn.dataset.tab)));

document.addEventListener('click', (e) => {
  const btn = e.target.closest('[data-action="speak"]');
  if (btn) toggleSpeak(btn);
});

// ============================================================
// TEXT-TO-SPEECH
// ============================================================
let voices = [];
let currentBtn = null;
const speechSupported = typeof window !== 'undefined' && 'speechSynthesis' in window;

function loadVoices() {
  if (!speechSupported) return;
  try {
    voices = window.speechSynthesis.getVoices().filter(v => v.lang.startsWith('en'));
    const select = document.getElementById('voiceSelect');
    if (!select) return;
    select.innerHTML = '';
    if (voices.length === 0) { select.innerHTML = '<option>Default English voice</option>'; return; }
    voices.forEach((v, i) => {
      const opt = document.createElement('option');
      opt.value = i;
      opt.textContent = `${v.name} (${v.lang})`;
      if (v.name.includes('Google UK English Female')) opt.selected = true;
      select.appendChild(opt);
    });
  } catch (e) { console.warn('Voice loading failed:', e); }
}
try { if (speechSupported) { window.speechSynthesis.onvoiceschanged = loadVoices; loadVoices(); } } catch (e) { console.warn(e); }

const rateSlider = document.getElementById('rateSlider');
const rateLabel = document.getElementById('rateLabel');
if (rateSlider) rateSlider.addEventListener('input', () => { rateLabel.textContent = rateSlider.value + 'x'; });

function toggleSpeak(btn) {
  if (!speechSupported) { alert('Text-to-speech is not supported in this browser.'); return; }
  try {
    const text = decodeURIComponent(btn.dataset.text);
    if (btn.classList.contains('speaking')) { window.speechSynthesis.cancel(); btn.classList.remove('speaking'); currentBtn = null; return; }
    window.speechSynthesis.cancel();
    if (currentBtn) currentBtn.classList.remove('speaking');
    const utter = new SpeechSynthesisUtterance(text);
    const voiceIdx = document.getElementById('voiceSelect').value;
    if (voices[voiceIdx]) utter.voice = voices[voiceIdx];
    utter.lang = 'en-US';
    utter.rate = parseFloat(rateSlider.value);
    utter.onstart = () => { btn.classList.add('speaking'); currentBtn = btn; };
    utter.onend = () => { btn.classList.remove('speaking'); currentBtn = null; };
    utter.onerror = () => { btn.classList.remove('speaking'); currentBtn = null; };
    window.speechSynthesis.speak(utter);
  } catch (e) { console.warn('toggleSpeak failed:', e); }
}
const stopAllBtn = document.getElementById('stopAllBtn');
if (stopAllBtn) stopAllBtn.addEventListener('click', () => {
  if (speechSupported) window.speechSynthesis.cancel();
  document.querySelectorAll('.listen-btn.speaking').forEach(b => b.classList.remove('speaking'));
  currentBtn = null;
});
